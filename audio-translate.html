<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 音频同声传译 (HTTP 稳定版)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <script type="importmap">
        {
            "imports": {
                "@material/web/": "https://esm.run/@material/web/"
            }
        }
    </script>
    <script type="module">
        import '@material/web/all.js';
    </script>

    <style>
        :root {
            --md-sys-color-background: #fcfcff;
            --md-sys-color-on-background: #1a1c1e;
            --md-sys-color-primary: #0061a4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-surface-container: #f0f4fa;
            --md-sys-color-on-surface: #1a1c1e;
        }

        body {
            font-family: 'Roboto', system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 28px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--md-sys-color-primary);
        }

        .header md-icon {
            font-size: 32px;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-section {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #e1e8f0;
            padding: 12px 16px;
            border-radius: 16px;
        }

        #fileName {
            font-size: 14px;
            color: #444;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hidden {
            display: none !important;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            text-align: center;
        }

        #loadingText {
            font-size: 14px;
            color: var(--md-sys-color-primary);
        }

        .audio-result-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fff;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #d1d8e0;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        md-outlined-text-field {
            width: 100%;
            --md-outlined-text-field-container-shape: 16px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header">
            <md-icon>interpreter_mode</md-icon>
            <h1>同声传译 (音频 -> 翻译音频)</h1>
        </div>

        <md-outlined-text-field
            id="proxyUrl"
            label="接口地址"
            value="/audioTranslate">
        </md-outlined-text-field>

        <!-- 模型选择：建议选择你后台中拥有的音频生成模型 -->
        <md-outlined-text-field
            id="modelName"
            label="调用模型"
            value="gemini-2.5-flash">
        </md-outlined-text-field>

        <div class="file-upload-section">
            <input type="file" id="audioFile" accept="audio/*, video/*">
            <md-filled-tonal-button id="uploadTriggerBtn">
                <md-icon slot="icon">audio_file</md-icon>
                选择音频
            </md-filled-tonal-button>
            <span id="fileName">尚未选择文件</span>
        </div>

        <md-filled-button id="translateBtn">
            <md-icon slot="icon">translate</md-icon>
            开始同声传译
        </md-filled-button>

        <div id="loadingSection" class="loading-container hidden">
            <md-linear-progress indeterminate style="width: 100%;"></md-linear-progress>
            <span id="loadingText">正在上传音频并等待 Google 翻译生成语音...</span>
        </div>

        <!-- 翻译完成的播放与下载区 -->
        <div id="resultSection" class="audio-result-box hidden">
            <span style="font-size: 14px; font-weight: bold;">🎧 翻译完成！试听中文语音：</span>
            <audio id="audioPlayer" controls></audio>
            <md-outlined-button id="saveBtn">
                <md-icon slot="icon">download</md-icon>
                下载翻译音频
            </md-outlined-button>
        </div>
    </div>

    <script>
        const proxyUrlInput = document.getElementById('proxyUrl');
        const modelNameInput = document.getElementById('modelName');
        const audioFileInput = document.getElementById('audioFile');
        const uploadTriggerBtn = document.getElementById('uploadTriggerBtn');
        const fileNameDisplay = document.getElementById('fileName');
        const translateBtn = document.getElementById('translateBtn');
        const resultSection = document.getElementById('resultSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const saveBtn = document.getElementById('saveBtn');
        const loadingSection = document.getElementById('loadingSection');

        uploadTriggerBtn.onclick = () => audioFileInput.click();
        audioFileInput.onchange = (e) => {
            const f = e.target.files[0];
            fileNameDisplay.textContent = f ? f.name : "尚未选择文件";
        };

        // 将音频文件直接读为 Base64 编码
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // Base64 转为可以供浏览器下载的二进制 Blob
        function base64ToBlob(base64, mimeType) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return new Blob([bytes], { type: mimeType });
        }

        translateBtn.addEventListener('click', async () => {
            const url = proxyUrlInput.value.trim();
            const model = modelNameInput.value.trim();
            const file = audioFileInput.files[0];

            if (!url) return alert('请输入接口地址');
            if (!model) return alert('请输入模型名称');
            if (!file) return alert('请先选择一个音频文件');

            translateBtn.disabled = true;
            uploadTriggerBtn.disabled = true;
            resultSection.classList.add('hidden');
            loadingSection.classList.remove('hidden');

            try {
                // 1. 获取本地音频的 Base64 编码
                const base64Audio = await fileToBase64(file);
                const mimeType = file.type || 'audio/mp3';

                // 2. 构造符合 Google 官方 REST 规范的请求体
                const payload = {
                    model: model,
                    contents: [{
                        parts: [
                            { text: "请听这段音频，并将其中的谈话内容翻译为中文。请只返回翻译后的中文语音，不要有任何多余的文本解释或废话。" },
                            { inlineData: { mimeType: mimeType, data: base64Audio } }
                        ]
                    }],
                    // ⭐️ 核心设置：请求输出格式为 AUDIO (语音)
                    generationConfig: {
                        responseModalities: ["AUDIO"]
                    }
                };

                // 3. 发送标准的 POST 请求到我们刚写的 Pages 后端
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }

                const data = await response.json();

                // 4. 解析传回的 JSON，提取 Google 生成的 MP3 语音
                const part = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                if (part && part.inlineData && part.inlineData.data) {
                    const outputMimeType = part.inlineData.mimeType || 'audio/mp3';
                    const outputBase64 = part.inlineData.data;

                    // 5. 将 Base64 直接赋给播放器
                    const audioUrl = `data:${outputMimeType};base64,${outputBase64}`;
                    audioPlayer.src = audioUrl;
                    resultSection.classList.remove('hidden');

                    // 6. 绑定下载按钮
                    saveBtn.onclick = () => {
                        const blob = base64ToBlob(outputBase64, outputMimeType);
                        const fileUrl = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = fileUrl;
                        a.download = `同声传译_${new Date().getTime()}.${outputMimeType.split('/')[1] || 'mp3'}`;
                        a.click();
                        URL.revokeObjectURL(fileUrl);
                    };

                } else {
                    alert("未能获取到生成的语音数据，请确保调用了支持音频输出的模型。");
                }

            } catch (err) {
                alert("请求发生错误: " + err.message);
            } finally {
                translateBtn.disabled = false;
                uploadTriggerBtn.disabled = false;
                loadingSection.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
