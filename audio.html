<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 音频翻译</title>

    <!-- 引入 Google Fonts (Roboto) 和 Material Symbols (图标) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <!-- 通过 ES Modules 引入官方 Material Web Components -->
    <script type="importmap">
        {
            "imports": {
                "@material/web/": "https://esm.run/@material/web/"
            }
        }
    </script>
    <script type="module">
        import '@material/web/all.js';
    </script>

    <style>
        :root {
            /* 主题色定义 */
            --md-sys-color-background: #fcfcff;
            --md-sys-color-on-background: #1a1c1e;
            --md-sys-color-primary: #0061a4;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-surface-container: #f0f4fa;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-tertiary: #6b5778;
        }

        body {
            font-family: 'Roboto', system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 28px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--md-sys-color-primary);
        }

        .header md-icon {
            font-size: 32px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
        }

        /* 隐藏原生文件上传按钮 */
        input[type="file"] {
            display: none;
        }

        .file-upload-section {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #e1e8f0;
            padding: 12px 16px;
            border-radius: 16px;
        }

        #fileName {
            font-size: 14px;
            color: #444;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hidden {
            display: none !important;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        #loadingText {
            font-size: 14px;
            color: var(--md-sys-color-primary);
        }

        /* 让文本框自适应 */
        md-outlined-text-field {
            width: 100%;
            --md-outlined-text-field-container-shape: 16px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header">
            <md-icon>auto_awesome</md-icon>
            <h1>Gemini 音频翻译</h1>
        </div>

        <md-outlined-text-field
            id="proxyUrl"
            label="接口地址 (Proxy URL)"
            value="https://findorp.pages.dev/audio">
        </md-outlined-text-field>

        <!-- 自定义文件上传组件 -->
        <div class="file-upload-section">
            <input type="file" id="audioFile" accept="audio/*">
            <md-filled-tonal-button id="uploadTriggerBtn">
                <md-icon slot="icon">audio_file</md-icon>
                选择音频
            </md-filled-tonal-button>
            <span id="fileName">尚未选择文件</span>
        </div>

        <md-filled-button id="translateBtn">
            <md-icon slot="icon">translate</md-icon>
            开始上传并翻译
        </md-filled-button>

        <div id="loadingSection" class="loading-container hidden">
            <md-linear-progress indeterminate style="width: 100%;"></md-linear-progress>
            <span id="loadingText">正在上传并交给 Gemini 处理，请稍候...</span>
        </div>

        <md-outlined-text-field
            id="resultText"
            type="textarea"
            label="翻译结果"
            rows="8"
            placeholder="结果将显示于此...">
        </md-outlined-text-field>

        <md-outlined-button id="saveBtn" class="hidden">
            <md-icon slot="icon">download</md-icon>
            保存为 TXT 文件
        </md-outlined-button>

    </div>

    <script>
        // DOM 元素绑定
        const proxyUrlInput = document.getElementById('proxyUrl');
        const audioFileInput = document.getElementById('audioFile');
        const uploadTriggerBtn = document.getElementById('uploadTriggerBtn');
        const fileNameDisplay = document.getElementById('fileName');
        const translateBtn = document.getElementById('translateBtn');
        const resultText = document.getElementById('resultText');
        const saveBtn = document.getElementById('saveBtn');
        const loadingSection = document.getElementById('loadingSection');

        // 绑定虚假上传按钮到真实的 input[type="file"]
        uploadTriggerBtn.addEventListener('click', () => {
            audioFileInput.click();
        });

        audioFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileNameDisplay.textContent = file.name;
            } else {
                fileNameDisplay.textContent = "尚未选择文件";
            }
        });

        // 转 Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // 核心请求逻辑
        translateBtn.addEventListener('click', async () => {
            const url = proxyUrlInput.value.trim();
            const file = audioFileInput.files[0];

            if (!url) {
                alert('请输入接口地址');
                return;
            }
            if (!file) {
                alert('请先选择一个音频文件');
                return;
            }

            // 锁定状态
            translateBtn.disabled = true;
            uploadTriggerBtn.disabled = true;
            loadingSection.classList.remove('hidden');
            resultText.value = '';
            saveBtn.classList.add('hidden');

            try {
                const base64Audio = await fileToBase64(file);
                
                // 组装发送给代理的 JSON
                const payload = {
                    contents: [{
                        parts: [
                            { text: "Please carefully listen to the audio and translate the speech into Simplified Chinese. Only output the final translated Chinese text." },
                            { inlineData: { mimeType: file.type || 'audio/mp3', data: base64Audio } }
                        ]
                    }]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }

                const data = await response.json();

                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    resultText.value = data.candidates[0].content.parts[0].text;
                    saveBtn.classList.remove('hidden');
                } else {
                    resultText.value = "未获取到结果: \n" + JSON.stringify(data, null, 2);
                }
            } catch (e) {
                resultText.value = "请求发生错误: " + e.message;
            } finally {
                // 解除状态
                translateBtn.disabled = false;
                uploadTriggerBtn.disabled = false;
                loadingSection.classList.add('hidden');
            }
        });

        // 文本保存逻辑
        saveBtn.addEventListener('click', () => {
            const text = resultText.value;
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Gemini_音频翻译_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
