<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findor Chat - Full Logic Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <div class="app-shell">
        <nav class="nav-rail">
            <div class="nav-rail-top">
                <button class="fab-trigger" id="create-room-fab" title="创建新频道">
                    <span class="material-symbols-rounded">add</span>
                </button>
            </div>
            
            <div class="nav-rail-middle">
                <div class="nav-destination active" id="btn-nav-lobby">
                    <div class="icon-wrapper">
                        <span class="material-symbols-rounded">grid_view</span>
                    </div>
                    <span class="nav-label">大厅</span>
                </div>
                
                <div class="nav-destination" id="btn-nav-chat">
                    <div class="icon-wrapper">
                        <span class="material-symbols-rounded">chat</span>
                    </div>
                    <span class="nav-label">对话</span>
                </div>
                
                <div class="nav-destination" id="btn-nav-group">
                    <div class="icon-wrapper">
                        <span class="material-symbols-rounded">group</span>
                    </div>
                    <span class="nav-label">成员</span>
                </div>
            </div>

            <div class="nav-rail-bottom">
                <div class="nav-destination logout-action" id="btn-nav-logout">
                    <div class="icon-wrapper">
                        <span class="material-symbols-rounded">logout</span>
                    </div>
                    <span class="nav-label">退出</span>
                </div>
            </div>
        </nav>

        <main class="main-container">
            <header class="top-app-bar">
                <div class="app-bar-content">
                    <div class="title-section">
                        <h1 class="headline-title" id="current-view-title">频道大厅</h1>
                        <div class="presence-indicator">
                            <span class="status-dot-active"></span>
                            <span id="online-count">0</span> 人在线
                        </div>
                    </div>
                </div>
                <div class="app-bar-actions">
                    <button class="action-icon-btn" id="set-name-btn" title="修改昵称">
                        <span class="material-symbols-rounded">account_circle</span>
                    </button>
                </div>
            </header>

            <div id="message-container" class="view-scroller">
                <div class="loading-state">
                    <p>正在连接实时同步服务...</p>
                </div>
            </div>

            <footer class="bottom-input-bar" id="chat-input-zone" style="display: none;">
                <div class="input-surface-wrapper">
                    <input type="text" id="chat-input" placeholder="输入消息内容..." autocomplete="off">
                    <button id="send-btn" class="send-action-fab">
                        <span class="material-symbols-rounded">send</span>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <div id="md3-toast"></div>

    <script src="chat.js"></script>
</body>
</html>
