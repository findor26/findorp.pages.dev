<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Chat - Findor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <div class="app-container">
        <nav class="navigation-rail">
            <button class="fab-btn">
                <span class="material-symbols-rounded">edit</span>
            </button>
            <div class="nav-icons">
                <span class="material-symbols-rounded" id="nav-lobby">grid_view</span>
                <span class="material-symbols-rounded" id="nav-chat">chat</span>
                <span class="material-symbols-rounded" id="nav-group">group</span>
                <span class="material-symbols-rounded logout-icon" id="nav-logout">logout</span>
            </div>
        </nav>

        <main class="chat-main">
            <header class="top-app-bar">
                <div class="header-content">
                    <h1 class="title-large">频道大厅</h1>
                    <div class="status-chip">
                        <span class="dot"></span>
                        <span id="online-count">1</span> 在线
                    </div>
                </div>
                <div class="top-actions">
                    <span class="material-symbols-rounded" id="set-name-btn" title="修改昵称">person_edit</span>
                    <span class="material-symbols-rounded">more_vert</span>
                </div>
            </header>

            <div id="message-container" class="message-view"></div>

            <footer class="input-area" style="visibility: hidden;">
                <div class="search-bar">
                    <input type="text" id="chat-input" placeholder="输入消息...">
                    <button id="send-btn" class="icon-button">
                        <span class="material-symbols-rounded">send</span>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <div id="md3-toast"></div>

    <script src="chat.js"></script>
</body>
</html>
