<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findor Chat - Full Logic Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <div class="app-shell">
        <nav class="nav-rail">
            <div class="nav-rail-top">
                <button class="fab" id="create-room-fab" title="创建新频道">
                    <span class="material-symbols-rounded">add</span>
                </button>
            </div>
            
            <div class="nav-destinations">
                <div class="nav-item active" id="btn-nav-lobby">
                    <span class="material-symbols-rounded">grid_view</span>
                    <span class="nav-label">大厅</span>
                </div>
                
                <div class="nav-item" id="btn-nav-chat">
                    <span class="material-symbols-rounded">chat</span>
                    <span class="nav-label">对话</span>
                </div>
                
                <div class="nav-item" id="btn-nav-group">
                    <span class="material-symbols-rounded">group</span>
                    <span class="nav-label">成员</span>
                </div>
            </div>

            <div class="nav-bottom">
                <div class="nav-item logout-item" id="btn-nav-logout">
                    <span class="material-symbols-rounded">logout</span>
                    <span class="nav-label">退出</span>
                </div>
            </div>
        </nav>

        <main class="content-main">
            <header class="app-bar">
                <div class="title-group">
                    <h1 id="current-view-title">频道大厅</h1>
                    <div class="status-chip">
                        <span class="status-dot"></span>
                        <span id="online-count">0</span> 人在线
                        <span id="current-view-subtitle" style="margin-left: 8px; opacity: 0.7;"></span>
                    </div>
                </div>
                <div class="app-bar-actions">
                    <button class="action-icon-btn" id="set-name-btn" title="修改昵称">
                        <span class="material-symbols-rounded">account_circle</span>
                    </button>
                </div>
            </header>

            <div id="message-container" class="message-view">
                <div class="loading-placeholder">
                    <p>正在连接实时同步服务...</p>
                </div>
            </div>

            <footer class="input-area" id="chat-input-zone" style="display: none;">
                <div class="input-container">
                    <input type="text" id="chat-input" placeholder="输入消息内容..." autocomplete="off">
                    <button id="send-btn" class="send-button">
                        <span class="material-symbols-rounded">send</span>
                    </button>
                </div>
            </footer>
        </main>
    </div>
    <div id="nickname-dialog-overlay" class="dialog-overlay">
    <div class="md3-dialog">
        <h2 class="dialog-title">修改昵称</h2>
        <div class="dialog-content">
            <div class="md3-text-field">
                <input type="text" id="new-nickname-input" placeholder="输入新昵称" maxlength="15">
                <div class="text-field-line"></div>
            </div>
        </div>
        <div class="dialog-actions">
            <button class="text-button" id="dialog-cancel-btn">取消</button>
            <button class="text-button primary-text" id="dialog-confirm-btn">确定</button>
        </div>
    </div>
    </div>

    <div id="md3-toast"></div>

    <script src="chat.js"></script>
</body>
</html>
