<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>留言板 | Findor's Space</title>

    <!-- MDUI 2 -->
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
      body {
        margin: 0;
        background: rgb(var(--mdui-color-surface));
        font-family:
          Roboto,
          PingFang SC,
          sans-serif;
      }
      #messages{
        display:flex;
        flex-direction:column;
        gap:16px;
      }

      .container {
        max-width: 700px;
        margin: auto;
        padding: 24px;
      }

      .message {
        margin-bottom: 16px;
      }

      .msg-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .nickname {
        font-weight: 500;
      }

      .time {
        font-size: 12px;
        opacity: 0.6;
      }

      .content {
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .interaction {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }

      .vote {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .admin-tools {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        border-top: 1px dashed rgb(var(--mdui-color-outline));
        padding-top: 8px;
      }

      footer {
        text-align: center;
        font-size: 12px;
        padding: 40px 0;
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>留言板</h1>

      <!-- 发布 -->
      <mdui-card variant="filled" style="padding: 20px; margin-bottom: 20px">
        <mdui-text-field
          label="称呼"
          maxlength="20"
          id="nickname"
          counter
        ></mdui-text-field>

        <br />

        <mdui-text-field
          label="留言内容"
          maxlength="500"
          rows="4"
          counter
          textarea
          id="content"
        ></mdui-text-field>

        <br />

        <div style="text-align: right">
          <mdui-button icon="send" onclick="sendMessage()">
            发布留言
          </mdui-button>
        </div>
      </mdui-card>

      <!-- 留言列表 -->
      <div id="messages"></div>

      <div
        id="load-trigger"
        style="height: 60px; text-align: center; line-height: 60px"
      >
        加载中...
      </div>

      <footer>© 2026 Findor · Powered by Cloudflare D1</footer>
    </div>

    <!-- 管理登录 -->
    <mdui-dialog id="admin-dialog">
      <span slot="headline">管理员验证</span>

      <mdui-text-field
        label="管理令牌"
        type="password"
        id="token-input"
      ></mdui-text-field>

      <div slot="actions">
        <mdui-button variant="text" onclick="closeAdmin()"> 取消 </mdui-button>

        <mdui-button onclick="saveAdmin()"> 确认 </mdui-button>
      </div>
    </mdui-dialog>

    <script>
      let page = 1;
      let loading = false;
      let noMore = false;

      let isAdmin = !!localStorage.getItem("admin_token");
      let userVotes = JSON.parse(localStorage.getItem("user_votes") || "{}");

      const container = document.getElementById("messages");

      // 获取留言
      async function fetchMessages(refresh = false) {
        if (loading) return;
        if (noMore && !refresh) return;

        loading = true;

        if (refresh) {
          page = 1;
          noMore = false;
          container.innerHTML = "";
        }

        try {
          const headers = isAdmin
            ? { "Admin-Token": localStorage.getItem("admin_token") }
            : {};

          const res = await fetch(`/api/messages?page=${page}&size=10`, {
            headers,
          });

          const data = await res.json();

          if (data.length === 0 && page === 1) {
            container.innerHTML = `<p style="text-align:center;opacity:.6">暂无留言</p>`;
          }

          data.forEach((m) => {
            container.insertAdjacentHTML("beforeend", buildMessage(m));
          });

          if (data.length < 10) noMore = true;

          page++;
        } catch (e) {
          console.error(e);
        }

        loading = false;
      }

      // 构建留言
      function buildMessage(m) {
        const vote = userVotes[m.id];

        return `

<mdui-card class="message">

<div class="msg-header">

<span class="nickname">${safe(m.nickname)}</span>

<span class="time">${prettyDate(m.created_at)}</span>

</div>

<div class="content">${safe(m.content)}</div>


<div class="interaction">

<mdui-button-icon
icon="thumb_up"
onclick="vote(${m.id},'up')"
></mdui-button-icon>

<span>${m.upvotes || 0}</span>

<mdui-button-icon
icon="thumb_down"
onclick="vote(${m.id},'down')"
></mdui-button-icon>

<span>${m.downvotes || 0}</span>

</div>

${isAdmin ? adminTools(m) : ""}

</mdui-card>

`;
      }

      // 管理工具
      function adminTools(m) {
        return `

<div class="admin-tools">

<mdui-button-icon icon="push_pin"
onclick="patch(${m.id},'pin')"></mdui-button-icon>

<mdui-button-icon icon="visibility_off"
onclick="patch(${m.id},'hide')"></mdui-button-icon>

<mdui-button-icon icon="delete"
onclick="del(${m.id})"></mdui-button-icon>

</div>

`;
      }

      // 发布留言
      async function sendMessage() {
        const nickname = document.getElementById("nickname").value.trim();
        const content = document.getElementById("content").value.trim();

        if (!nickname || !content) {
          mdui.snackbar({ message: "请填写完整" });
          return;
        }

        await fetch("/api/messages", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({ nickname, content }),
        });

        document.getElementById("content").value = "";

        fetchMessages(true);
      }

      // 投票
      async function vote(id, type) {
        await fetch("/api/messages", {
          method: "PATCH",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            id,
            action: type === "up" ? "upvote" : "downvote",
          }),
        });

        fetchMessages(true);
      }

      // 管理操作
      async function patch(id, action) {
        await fetch("/api/messages", {
          method: "PATCH",

          headers: {
            "Content-Type": "application/json",
            "Admin-Token": localStorage.getItem("admin_token"),
          },

          body: JSON.stringify({ id, action }),
        });

        fetchMessages(true);
      }

      // 删除
      async function del(id) {
        if (!confirm("确认删除？")) return;

        await fetch(`/api/messages?id=${id}`, {
          method: "DELETE",

          headers: {
            "Admin-Token": localStorage.getItem("admin_token"),
          },
        });

        fetchMessages(true);
      }

      // 工具
      function safe(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function prettyDate(s) {
        const d = new Date(s);
        return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
      }

      // 无限滚动
      const observer = new IntersectionObserver((e) => {
        if (e[0].isIntersecting) fetchMessages();
      });

      observer.observe(document.getElementById("load-trigger"));

      // 初始化
      fetchMessages();
    </script>
  </body>
</html>
