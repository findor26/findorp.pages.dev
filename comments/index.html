<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 | Findor's Space</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2.0.3/mdui.css">
    <script src="https://unpkg.com/mdui@2.0.3/mdui.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body {
            font-family: 'Roboto', 'PingFang SC', sans-serif;
            background-color: rgb(var(--mdui-color-surface));
            color: rgb(var(--mdui-color-on-surface));
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        .header-title {
            margin-bottom: 32px;
            font-weight: 400;
        }

        .stats-grid {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-card {
            padding: 24px;
            margin-bottom: 24px;
            background-color: rgb(var(--mdui-color-surface-container-low));
        }

        .msg-item {
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }

        .msg-item.pinned {
            border: 2px solid rgb(var(--mdui-color-primary));
        }

        .msg-item.hidden {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        .interaction-bar {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .admin-tools {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed rgb(var(--mdui-color-outline-variant));
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ip-info {
            font-size: 11px;
            color: rgb(var(--mdui-color-outline));
            margin-left: auto;
        }

        #load-more-trigger {
            padding: 32px 0;
            text-align: center;
            color: rgb(var(--mdui-color-outline));
        }

        footer {
            padding: 48px 0;
            text-align: center;
            font-size: 12px;
            color: rgb(var(--mdui-color-outline));
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header-title mdui-typo-display-small">留言板</h1>

        <div id="admin-stats-bar" class="stats-grid">
            <mdui-card variant="filled" style="padding: 16px; text-align: center;">
                <div class="mdui-typo-headline-small" id="count-total" style="color: rgb(var(--mdui-color-primary));">0</div>
                <div class="mdui-typo-label-medium">总计留言</div>
            </mdui-card>
            <mdui-card variant="filled" style="padding: 16px; text-align: center;">
                <div class="mdui-typo-headline-small" id="count-today" style="color: rgb(var(--mdui-color-primary));">0</div>
                <div class="mdui-typo-label-medium">今日新增</div>
            </mdui-card>
        </div>

        <mdui-card class="input-card">
            <mdui-text-field label="称呼" id="nickname" maxlength="20" counter variant="outlined" style="margin-bottom: 16px;"></mdui-text-field>
            <mdui-text-field label="写下你的想法..." id="content" rows="3" maxlength="500" counter variant="outlined" style="margin-bottom: 16px;"></mdui-text-field>
            
            <div style="display: flex; justify-content: flex-end;">
                <mdui-button id="post-btn" onclick="handleSendMessage()">
                    <mdui-icon slot="icon" name="send"></mdui-icon>发布留言
                </mdui-button>
            </div>
        </mdui-card>

        <div id="message-container"></div>
        
        <div id="load-more-trigger">
            <mdui-circular-progress></mdui-circular-progress>
        </div>

        <div style="display: flex; justify-content: center; margin: 32px 0;" id="bottom-bar"></div>
    </div>

    <mdui-dialog id="auth-modal" close-on-overlay-click>
        <span slot="headline">身份验证</span>
        <p style="margin: 0 0 16px 0;">请输入管理令牌以解锁高级功能。</p>
        <mdui-text-field type="password" id="token-input" label="管理令牌" toggle-password variant="outlined"></mdui-text-field>
        <mdui-button slot="action" variant="text" onclick="document.getElementById('auth-modal').open = false">取消</mdui-button>
        <mdui-button slot="action" variant="tonal" onclick="saveAdminAuth()">确认</mdui-button>
    </mdui-dialog>

    <footer>
        &copy; 2026 Findor &bull; Powered By Cloudflare D1
    </footer>

    <script>
        let userVotes = JSON.parse(localStorage.getItem('user_votes') || '{}');
        let isAdmin = !!localStorage.getItem('admin_token');
        let currentPage = 1;
        let isFetching = false;
        let noMoreData = false;
        let lastTopMessageId = null;
        let autoRefreshTimer = null;

        const nickInp = document.getElementById('nickname');
        const contInp = document.getElementById('content');

        // 数据拉取核心逻辑
        async function fetchMessages(refresh = false) {
            if (isFetching || (noMoreData && !refresh)) return;
            if (refresh) {
                currentPage = 1;
                noMoreData = false;
                document.getElementById('message-container').innerHTML = '';
            }

            isFetching = true;
            const trigger = document.getElementById('load-more-trigger');

            try {
                const headers = isAdmin ? { 'Admin-Token': localStorage.getItem('admin_token') } : {};
                const res = await fetch(`/api/messages?page=${currentPage}&size=10`, { headers });
                
                if (res.status === 401 && isAdmin) {
                    clearAdminAuth();
                    return;
                }

                const data = await res.json();
                const container = document.getElementById('message-container');

                if (data.length === 0 && currentPage === 1) {
                    container.innerHTML = `
                        <div style="text-align:center; padding: 64px 0; opacity: 0.5;">
                            <mdui-icon name="cloud_off" style="font-size: 48px;"></mdui-icon>
                            <p>暂无留言</p>
                        </div>`;
                    noMoreData = true;
                } else {
                    if (data.length < 10) noMoreData = true;
                    if (currentPage === 1 && data.length > 0) lastTopMessageId = data[0].id;
                    
                    data.forEach(m => container.insertAdjacentHTML('beforeend', buildMessageHTML(m)));
                    currentPage++;
                }
            } catch (err) {
                console.error(err);
            } finally {
                isFetching = false;
                trigger.style.display = noMoreData ? 'none' : 'block';
            }
        }

        function buildMessageHTML(m) {
            const pinned = m.is_pinned === 1;
            const hidden = m.is_hidden === 1;
            const myVote = userVotes[m.id];

            return `
                <mdui-card variant="outlined" class="msg-item ${pinned ? 'pinned' : ''} ${hidden ? 'hidden' : ''}" id="msg-card-${m.id}" style="padding: 20px;">
                    ${pinned ? '<div style="color:rgb(var(--mdui-color-primary)); display:flex; align-items:center; gap:4px; font-size:12px; margin-bottom:8px;"><mdui-icon name="push_pin" style="font-size:14px;"></mdui-icon>已置顶</div>' : ''}
                    
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <span style="font-weight:500; color:rgb(var(--mdui-color-primary));">${safeText(m.nickname)}</span>
                        <span style="font-size:12px; opacity:0.6;">${prettyDate(m.created_at)}</span>
                    </div>

                    <div style="line-height:1.6; white-space:pre-wrap; word-break:break-all;">${safeText(m.content)}</div>

                    <div class="interaction-bar">
                        <mdui-chip onclick="submitVote(${m.id}, 'up')" ${myVote === 'up' ? 'selected' : ''}>
                            <mdui-icon slot="icon" name="${myVote === 'up' ? 'thumb_up' : 'thumb_up_off_alt'}"></mdui-icon>
                            <span>${m.upvotes || 0}</span>
                        </mdui-chip>
                        <mdui-chip onclick="submitVote(${m.id}, 'down')" ${myVote === 'down' ? 'selected' : ''}>
                            <mdui-icon slot="icon" name="${myVote === 'down' ? 'thumb_down' : 'thumb_down_off_alt'}"></mdui-icon>
                            <span>${m.downvotes || 0}</span>
                        </mdui-chip>
                    </div>

                    ${isAdmin ? `
                        <div class="admin-tools">
                            <mdui-button-icon icon="${pinned ? 'push_pin' : 'push_pin_outlined'}" onclick="handlePatch(${m.id}, 'pin')"></mdui-button-icon>
                            <mdui-button-icon icon="${hidden ? 'visibility_off' : 'visibility'}" onclick="handlePatch(${m.id}, 'hide')"></mdui-button-icon>
                            <mdui-button-icon icon="delete_outline" onclick="handleDelete(${m.id})"></mdui-button-icon>
                            <span class="ip-info">IP: ${m.ip_address || 'Unknown'}</span>
                        </div>
                    ` : ''}
                </mdui-card>
            `;
        }

        async function submitVote(id, type) {
            const currentVote = userVotes[id];
            let action = (currentVote === type) ? (type === 'up' ? 'un_upvote' : 'un_downvote') : (type === 'up' ? 'upvote' : 'downvote');

            if (currentVote && currentVote !== type) return alert("请先取消当前的互动");

            try {
                const res = await fetch('/api/messages', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, action })
                });

                if (res.ok) {
                    if (action.startsWith('un_')) delete userVotes[id];
                    else userVotes[id] = type;
                    localStorage.setItem('user_votes', JSON.stringify(userVotes));
                    // 局部刷新以同步计数（此处为保持逻辑完整采用全刷新或根据需求微调）
                    fetchMessages(true);
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function handleSendMessage() {
            const nickname = nickInp.value.trim();
            const content = contInp.value.trim();
            const btn = document.getElementById('post-btn');

            if (!nickname || !content) return alert("信息填写不完整");

            btn.loading = true;
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, content })
                });
                if (res.ok) {
                    contInp.value = '';
                    fetchMessages(true);
                }
            } finally {
                btn.loading = false;
            }
        }

        async function handlePatch(id, action) {
            const res = await fetch('/api/messages', {
                method: 'PATCH',
                headers: { 
                    'Content-Type': 'application/json',
                    'Admin-Token': localStorage.getItem('admin_token')
                },
                body: JSON.stringify({ id, action })
            });
            if (res.ok) fetchMessages(true);
        }

        async function handleDelete(id) {
            if (!confirm("确定要移除这条留言吗？")) return;
            const res = await fetch(`/api/messages?id=${id}`, {
                method: 'DELETE',
                headers: { 'Admin-Token': localStorage.getItem('admin_token') }
            });
            if (res.ok) fetchMessages(true);
        }

        async function fetchAdminStats() {
            if (!isAdmin) return;
            const res = await fetch('/api/messages?stats=true', {
                headers: { 'Admin-Token': localStorage.getItem('admin_token') }
            });
            if (res.ok) {
                const stats = await res.json();
                document.getElementById('count-total').textContent = stats.total;
                document.getElementById('count-today').textContent = stats.today;
                document.getElementById('admin-stats-bar').style.display = 'grid';
            }
        }

        function updateUIState() {
            const bar = document.getElementById('bottom-bar');
            if (isAdmin) {
                bar.innerHTML = `<mdui-button variant="text" style="color:rgb(var(--mdui-color-error))" onclick="clearAdminAuth()">
                    <mdui-icon slot="icon" name="logout"></mdui-icon>退出管理模式</mdui-button>`;
                fetchAdminStats();
            } else {
                bar.innerHTML = `<mdui-button variant="text" onclick="document.getElementById('auth-modal').open = true">
                    <mdui-icon slot="icon" name="admin_panel_settings"></mdui-icon>管理入口</mdui-button>`;
            }
        }

        function saveAdminAuth() {
            const t = document.getElementById('token-input').value.trim();
            if (t) {
                localStorage.setItem('admin_token', t);
                location.reload();
            }
        }

        function clearAdminAuth() {
            localStorage.removeItem('admin_token');
            location.reload();
        }

        function safeText(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function prettyDate(s) { 
            const d = new Date(s);
            return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        }

        const scrollObserver = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && !noMoreData && !isFetching) fetchMessages();
        }, { threshold: 0.1 });
        scrollObserver.observe(document.getElementById('load-more-trigger'));

        updateUIState();
        fetchMessages();
    </script>
</body>
</html>
