<!doctype html>
<html lang="zh-CN">
  <head>
    <title>资源仓库 | Findor's Files</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="vrf.js"></script>
    <link rel="stylesheet" href="../style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --md-sys-color-primary: #006495;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-surface: #fcfcff;
        --md-sys-color-outline: #72777f;
        --md-sys-color-surface-variant: #dee3eb;
      }

      body {
        background-color: var(--md-sys-color-surface);
        font-family: "Roboto", sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      header {
        width: 100%;
        padding: 32px 24px;
        background-color: #cbe6ff;
        text-align: center;
        border-bottom-left-radius: 24px;
        border-bottom-right-radius: 24px;
      }

      main {
        width: 90%;
        max-width: 800px;
        margin: 24px 0;
      }

      /* 文件列表容器 */
      .file-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* MD3 列表项样式 */
      .file-item {
        display: flex;
        align-items: center;
        padding: 16px;
        background-color: var(--md-sys-color-surface);
        border: 1px solid var(--md-sys-color-outline);
        border-radius: 16px;
        text-decoration: none;
        transition:
          background-color 0.2s,
          transform 0.1s;
      }

      .file-item:hover {
        background-color: #f0f4f8;
        transform: scale(1.01);
      }

      .file-icon {
        width: 40px;
        height: 40px;
        background-color: #cbe6ff;
        color: var(--md-sys-color-primary);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 16px;
        font-weight: bold;
      }

      .file-info {
        flex: 1;
      }

      .file-name {
        display: block;
        font-weight: 500;
        color: var(--md-sys-color-primary);
      }

      .file-meta {
        font-size: 0.8rem;
        color: #72777f;
      }

      .back-link {
        margin-top: 24px;
        font-size: 0.9rem;
        color: var(--md-sys-color-primary);
        text-decoration: none;
      }
      /* 进入动画：从小放大并上浮 */
@keyframes md3-enter {
  from { opacity: 0; transform: scale(0.9) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* 退出动画：缩小并下沉 */
@keyframes md3-exit {
  from { opacity: 1; transform: scale(1) translateY(0); }
  to { opacity: 0; transform: scale(0.95) translateY(10px); }
}

/* 背景遮罩淡入淡出 */
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

/* 默认状态类 */
.dialog-showing { animation: fade-in 0.2s forwards; }
.dialog-hiding { animation: fade-out 0.2s forwards; }

.dialog-content-showing { animation: md3-enter 0.3s cubic-bezier(0.05, 0.7, 0.1, 1.0) forwards; }
.dialog-content-hiding { animation: md3-exit 0.2s ease-in forwards; }
    </style>
  </head>
  <body>
    <header>
      <h1
        style="margin: 0; font-size: 1.5rem; color: var(--md-sys-color-primary)"
      >
        资源中心
      </h1>
      <p style="opacity: 0.7; margin: 8px 0 0">Scripts & Configuration Files</p>
    </header>

    <main>
      <div class="file-grid">
        <a
          href="javascript:void(0)"
          class="file-item"
          onclick="
            verifyPassword(
              '3D%E5%9D%A6%E5%85%8B%E8%B0%83%E8%AF%95%E5%99%A8-1.6.3.user.js',
            )
          "
        >
          <div class="file-icon">JS</div>
          <div class="file-info">
            <span class="file-name">3D坦克调试器</span>
            <span class="file-meta">3D坦克调试器 (v1.6.3)</span>
          </div>
        </a>

        <div id="pw-dialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:var(--md-sys-color-surface); padding:24px; border-radius:28px; width:90%; max-width:320px; box-shadow:0 8px 24px rgba(0,0,0,0.2);">
    <h3 style="margin:0 0 16px; color:var(--md-sys-color-primary);">身份验证</h3>
    
    <form id="pw-form" onsubmit="return false;">
      <input type="text" name="username" value="guest" autocomplete="username" style="display:none;">
      <input type="password" id="pw-input" name="password" autocomplete="current-password" placeholder="输入密码" 
             onkeydown="if(event.keyCode==13) confirmPassword()"
             style="width:100%; padding:14px; border:1px solid var(--md-sys-color-outline); border-radius:12px; margin-bottom:24px; box-sizing:border-box;">
      
      <div style="display:flex; justify-content:flex-end; gap:8px;">
        <button type="button" onclick="closeDialog()" style="background:none; border:none; color:var(--md-sys-color-primary); cursor:pointer;">取消</button>
        <button type="button" onclick="confirmPassword()" style="background:var(--md-sys-color-primary); border:none; color:var(--md-sys-color-on-primary); padding:10px 24px; border-radius:100px; cursor:pointer;">确定</button>
      </div>
    </form>
  </div>
</div>
          </div>
        </div>
      </div>

      <a href="../index.html" class="back-link">← 返回主站</a>
      
    </main>

    <footer style="padding: 32px; font-size: 0.8rem; color: #72777f">
      &copy; 2026 Findor. 资源托管于 Cloudflare Pages.
    </footer>
  </body>
</html>
