<!doctype html>
<html lang="zh-CN">
  <head>
    <title>资源仓库 | Findor's Files</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --md-sys-color-primary: #006495;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-surface: #fcfcff;
        --md-sys-color-outline: #72777f;
        --md-sys-color-surface-variant: #dee3eb;
      }

      body {
        background-color: var(--md-sys-color-surface);
        font-family: "Roboto", sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      header {
        width: 100%;
        padding: 32px 24px;
        background-color: #cbe6ff;
        text-align: center;
        border-bottom-left-radius: 24px;
        border-bottom-right-radius: 24px;
      }

      main {
        width: 90%;
        max-width: 800px;
        margin: 24px 0;
      }

      /* 文件列表容器 */
      .file-grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* MD3 列表项样式 */
      .file-item {
        display: flex;
        align-items: center;
        padding: 16px;
        background-color: var(--md-sys-color-surface);
        border: 1px solid var(--md-sys-color-outline);
        border-radius: 16px;
        text-decoration: none;
        transition: background-color 0.2s, transform 0.1s;
      }

      .file-item:hover {
        background-color: #f0f4f8;
        transform: scale(1.01);
      }

      .file-icon {
        width: 40px;
        height: 40px;
        background-color: #cbe6ff;
        color: var(--md-sys-color-primary);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 16px;
        font-weight: bold;
      }

      .file-info {
        flex: 1;
      }

      .file-name {
        display: block;
        font-weight: 500;
        color: var(--md-sys-color-primary);
      }

      .file-meta {
        font-size: 0.8rem;
        color: #72777f;
      }

      .back-link {
        margin-top: 24px;
        font-size: 0.9rem;
        color: var(--md-sys-color-primary);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 style="margin:0; font-size: 1.5rem; color: var(--md-sys-color-primary);">资源中心</h1>
      <p style="opacity: 0.7; margin: 8px 0 0;">Scripts & Configuration Files</p>
    </header>

    <main>
      <div class="file-grid">
        <a href="3D%E5%9D%A6%E5%85%8B%E8%B0%83%E8%AF%95%E5%99%A8-1.6.3.user.js" class="file-item">
          <div class="file-icon">JS</div>
          <div class="file-info">
            <span class="file-name">3D坦克调试器</span>
            <span class="file-meta">3D坦克调试器 (v1.6.3)</span>
          </div>
        </a>
      </div>

      <a href="../index.html" class="back-link">← 返回主站</a>
    </main>

    <footer style="padding: 32px; font-size: 0.8rem; color: #72777f;">
      &copy; 2026 Findor. 资源托管于 Cloudflare Pages.
    </footer>
  </body>
</html>
