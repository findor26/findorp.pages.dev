<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Ably 多人游戏测试</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        #game { width: 600px; height: 400px; border: 2px solid #333; position: relative; background: #eee; }
        .tank { width: 30px; height: 30px; position: absolute; background: #0061a4; transition: 0.1s; }
        .remote { background: #ba1a1a; }
    </style>
</head>
<body>
    <h1>联机坦克 (WASD 移动)</h1>
    <div id="game"></div>

    <script>
        let channel;
        const myId = 'player-' + Math.random().toString(36).substring(7);
        const tanks = {};

        async function start() {
            // 安全模式：指向你的 Cloudflare Function 授权接口
            const ably = new Ably.Realtime({ 
                authUrl: '/api/auth',
                clientId: myId 
            });

            await ably.connection.once('connected');
            console.log("✅ 成功连接！");

            channel = ably.channels.get('game-room');

            // 订阅：收到别人移动的消息
            await channel.subscribe('move', (msg) => {
                if (msg.clientId === myId) return;
                updateTank(msg.clientId, msg.data, true);
            });

            // 自己移动
            window.onkeydown = (e) => {
                const pos = { x: parseInt(myTank.style.left || 0), y: parseInt(myTank.style.top || 0) };
                if (e.key === 'w') pos.y -= 10;
                if (e.key === 's') pos.y += 10;
                if (e.key === 'a') pos.x -= 10;
                if (e.key === 'd') pos.x += 10;
                
                myTank.style.left = pos.x + 'px';
                myTank.style.top = pos.y + 'px';
                channel.publish('move', pos);
            };
        }

        const myTank = document.createElement('div');
        myTank.className = 'tank';
        document.getElementById('game').appendChild(myTank);

        function updateTank(id, pos, isRemote) {
            if (!tanks[id]) {
                const el = document.createElement('div');
                el.className = 'tank' + (isRemote ? ' remote' : '');
                document.getElementById('game').appendChild(el);
                tanks[id] = el;
            }
            tanks[id].style.left = pos.x + 'px';
            tanks[id].style.top = pos.y + 'px';
        }

        start();
    </script>
</body>
</html>
