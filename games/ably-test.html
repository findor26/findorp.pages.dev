<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findor's Tank | 完整联机对战版</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        body { margin: 0; background: #202124; color: white; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #1a1a1b; }
        .tank { 
            position: absolute; width: 40px; height: 40px; 
            background: #0061a4; border-radius: 4px; 
            transition: transform 0.1s linear, left 0.1s linear, top 0.1s linear;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: white; z-index: 5;
        }
        .tank::after { /* 炮管 */
            content: ''; position: absolute; top: -10px; left: 18px; 
            width: 4px; height: 15px; background: #ccc; 
        }
        .remote { background: #ba1a1a; }
        /* 子弹样式 */
        .bullet { 
            position: absolute; width: 8px; height: 8px; 
            background: #ffff00; border-radius: 50%; 
            z-index: 10; box-shadow: 0 0 8px #ffff00; 
        }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="ui">
    <div>状态: <span id="status">连接中...</span></div>
    <div>我的 ID: <span id="my-id">-</span></div>
    <div>在线坦克: <span id="count">1</span></div>
</div>

<div id="game-container"></div>

<script>
    const container = document.getElementById('game-container');
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('my-id');
    const countEl = document.getElementById('count');

    const myId = 'Tank-' + Math.random().toString(36).substring(7);
    const players = {}; 
    let channel;
    let myPos = { x: 100, y: 100, angle: 0 };
    let myTankEl;

    async function init() {
        try {
            const response = await fetch('/api/auth');
            const apiKey = await response.text();
            if (!apiKey.includes(':')) throw new Error("API Key 异常");

            const ably = new Ably.Realtime({ key: apiKey.trim(), clientId: myId });
            await ably.connection.once('connected');
            
            statusEl.textContent = "✅ 已联机";
            myIdEl.textContent = myId;
            channel = ably.channels.get('game-room');

            // --- 核心订阅逻辑 ---
            // 1. 订阅移动 (m)
            channel.subscribe('m', (msg) => {
                if (msg.clientId === myId) return;
                updateRemotePlayer(msg.clientId, msg.data);
            });

            // 2. 订阅开火 (f)
            channel.subscribe('f', (msg) => {
                if (msg.clientId === myId) return;
                createBullet(msg.data, false); // 渲染别人的子弹
            });

            // 3. 订阅受击 (h)
            channel.subscribe('h', (msg) => {
                flashTank(msg.data.targetId);
            });

            // 4. 在场逻辑
            channel.presence.subscribe('leave', (m) => {
                if (players[m.clientId]) {
                    players[m.clientId].remove();
                    delete players[m.clientId];
                    updateCount();
                }
            });
            await channel.presence.enter();
            updateCount();

            createMyTank();
            startLoop();

        } catch (err) {
            statusEl.textContent = "❌ 失败: " + err.message;
        }
    }

    function createMyTank() {
        myTankEl = document.createElement('div');
        myTankEl.className = 'tank';
        myTankEl.innerText = 'ME';
        container.appendChild(myTankEl);
        syncPos(myTankEl, myPos);
    }

    function updateRemotePlayer(id, data) {
        if (!players[id]) {
            const el = document.createElement('div');
            el.className = 'tank remote';
            el.innerText = id.substring(5, 9);
            container.appendChild(el);
            players[id] = el;
            updateCount();
        }
        syncPos(players[id], data);
    }

    function syncPos(el, data) {
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.style.transform = `rotate(${data.angle}deg)`;
    }

    // 子弹生成与飞行逻辑
    function createBullet(data, isMine) {
        const b = document.createElement('div');
        b.className = 'bullet';
        container.appendChild(b);

        let curX = data.x, curY = data.y;
        let dist = 0;
        const speed = 15; 
        const rad = (data.angle - 90) * Math.PI / 180;

        const bulletLoop = setInterval(() => {
            curX += Math.cos(rad) * speed;
            curY += Math.sin(rad) * speed;
            b.style.left = curX + 'px';
            b.style.top = curY + 'px';
            dist += speed;

            // 如果是我发的子弹，负责检测是否撞到了别人
            if (isMine) {
                for (let id in players) {
                    const p = players[id];
                    const tx = parseFloat(p.style.left), ty = parseFloat(p.style.top);
                    if (Math.hypot(curX - tx - 20, curY - ty - 20) < 25) {
                        channel.publish('h', { targetId: id });
                        clearInterval(bulletLoop);
                        b.remove();
                    }
                }
            }

            if (dist > 600) { clearInterval(bulletLoop); b.remove(); }
        }, 20);
    }

    function flashTank(id) {
        const target = (id === myId) ? myTankEl : players[id];
        if (target) {
            target.style.background = 'white';
            setTimeout(() => target.style.background = '', 50);
        }
    }

    function updateCount() {
        channel.presence.get((err, members) => {
            if (!err) countEl.textContent = members.length;
        });
    }

    function startLoop() {
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => {
            if (e.key === ' ') { // 空格开火 (按起触发，防止连发)
                const bData = { x: myPos.x + 16, y: myPos.y + 16, angle: myPos.angle };
                createBullet(bData, true);
                channel.publish('f', bData);
            }
            keys[e.key.toLowerCase()] = false;
        };

        setInterval(() => {
            let moved = false;
            if (keys['w']) { myPos.y -= 5; myPos.angle = 0; moved = true; }
            else if (keys['s']) { myPos.y += 5; myPos.angle = 180; moved = true; }
            else if (keys['a']) { myPos.x -= 5; myPos.angle = 270; moved = true; }
            else if (keys['d']) { myPos.x += 5; myPos.angle = 90; moved = true; }

            if (moved) {
                syncPos(myTankEl, myPos);
                channel.publish('m', myPos);
            }
        }, 30);
    }

    init();
</script>
</body>
</html>
