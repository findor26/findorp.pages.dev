<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findor's Tank | 完整联机对战版</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        body { margin: 0; background: #202124; color: white; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #1a1a1b; }
        
        /* 坦克基础样式 */
        .tank { 
            position: absolute; width: 40px; height: 40px; 
            background: #0061a4; border-radius: 4px; 
            transition: transform 0.06s linear, left 0.06s linear, top 0.06s linear;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: white; z-index: 5;
        }
        .tank::after { /* 炮管 */
            content: ''; position: absolute; top: -10px; left: 18px; 
            width: 4px; height: 15px; background: #ccc; 
        }
        .remote { background: #ba1a1a; }
        
        /* 血条样式 */
        .health-bar-container {
            position: absolute; top: -20px; left: 0;
            width: 40px; height: 4px; background: #444; border-radius: 2px;
        }
        .health-bar-fill {
            width: 100%; height: 100%; background: #00ff00;
            transition: width 0.2s ease-out;
        }

        /* 子弹与道具 */
        .bullet { position: absolute; width: 8px; height: 8px; background: #ffff00; border-radius: 50%; z-index: 10; box-shadow: 0 0 8px #ffff00; }
        .item {
            position: absolute; width: 24px; height: 24px; border-radius: 4px; z-index: 4; 
            display: flex; align-items: center; justify-content: center; font-size: 14px; 
            font-weight: bold; animation: pulse 1s infinite alternate;
        }
        .item-heal { background: #4caf50; box-shadow: 0 0 10px #4caf50; }
        .item-speed { background: #2196f3; box-shadow: 0 0 10px #2196f3; }
        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }

        /* UI 与 控制器 */
        #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
        #joystick-container { position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 1000; }
        #joystick-knob { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; left: 35px; top: 35px; }
        #fire-btn { 
            position: fixed; bottom: 60px; right: 40px; width: 80px; height: 80px; 
            background: rgba(186, 26, 26, 0.6); border-radius: 50%; z-index: 1000;
            display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div>状态: <span id="status">连接中...</span></div>
    <div>ID: <span id="my-id">-</span></div>
    <div>在线: <span id="count">1</span></div>
</div>

<div id="game-container"></div>

<div id="joystick-container">
    <div id="joystick-knob"></div>
</div>
<div id="fire-btn">FIRE</div>

<script>
    const container = document.getElementById('game-container');
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('my-id');
    const countEl = document.getElementById('count');
    const knob = document.getElementById('joystick-knob');
    const fireBtn = document.getElementById('fire-btn');

    // 核心变量
    const myId = 'Tank-' + Math.random().toString(36).substring(7);
    const players = {}; 
    const items = {}; 
    let channel;
    let myPos = { x: 100, y: 100, angle: 0 };
    let lastSentPos = { x: 0, y: 0, angle: 0 };
    let myHealth = 100;
    let mySpeed = 5;
    let myTankEl;
    let isHost = false;

    // 摇杆变量
    let joystickActive = false;
    let joystickVector = { x: 0, y: 0 };

    async function init() {
        try {
            const response = await fetch('/api/auth');
            const apiKey = await response.text();
            const ably = new Ably.Realtime({ key: apiKey.trim(), clientId: myId });
            await ably.connection.once('connected');
            
            statusEl.textContent = "✅ 已联机";
            myIdEl.textContent = myId;
            channel = ably.channels.get('game-room');

            // 订阅逻辑
            channel.subscribe('m', (msg) => { if (msg.clientId !== myId) updateRemotePlayer(msg.clientId, msg.data); });
            channel.subscribe('f', (msg) => { if (msg.clientId !== myId) createBullet(msg.data, false); });
            channel.subscribe('h', (msg) => handleHit(msg.data.targetId));
            channel.subscribe('i', (msg) => spawnItem(msg.data));
            channel.subscribe('d', (msg) => removeItem(msg.data.itemId));

            channel.presence.subscribe('enter', () => checkHost());
            channel.presence.subscribe('leave', (m) => {
                if (players[m.clientId]) { players[m.clientId].remove(); delete players[m.clientId]; }
                checkHost();
            });

            await channel.presence.enter();
            checkHost();

            createMyTank();
            initJoystick();
            startLoop();

            fireBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); triggerFire(); });

            // 房主定时生成道具
            setInterval(() => { if (isHost) generateItem(); }, 8000);

        } catch (err) { statusEl.textContent = "❌ 失败: " + err.message; }
    }

    function checkHost() {
        channel.presence.get((err, members) => {
            if (!err && members.length > 0) {
                const sorted = members.sort((a, b) => a.timestamp - b.timestamp);
                isHost = (sorted[0].clientId === myId);
                updateCountDisplay(members.length);
            }
        });
    }

    function createMyTank() {
        myTankEl = document.createElement('div');
        myTankEl.className = 'tank';
        myTankEl.innerHTML = `ME<div class="health-bar-container"><div id="my-hp" class="health-bar-fill"></div></div>`;
        container.appendChild(myTankEl);
        syncPos(myTankEl, myPos);
    }

    function updateRemotePlayer(id, data) {
        if (!players[id]) {
            const el = document.createElement('div');
            el.className = 'tank remote';
            el.innerHTML = `${id.substring(5, 9)}<div class="health-bar-container"><div id="hp-${id}" class="health-bar-fill"></div></div>`;
            container.appendChild(el);
            players[id] = el;
        }
        syncPos(players[id], data);
        if (data.hp !== undefined) updateHPUI(id, data.hp);
    }

    function syncPos(el, data) {
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.style.transform = `rotate(${data.angle}deg)`;
    }

    function updateHPUI(id, hp) {
        const fill = (id === myId) ? document.getElementById('my-hp') : document.getElementById(`hp-${id}`);
        if (fill) {
            fill.style.width = hp + '%';
            fill.style.background = hp < 30 ? '#f44336' : (hp < 60 ? '#ffeb3b' : '#4caf50');
        }
    }

    function triggerFire() {
        const bData = { x: myPos.x + 16, y: myPos.y + 16, angle: myPos.angle };
        createBullet(bData, true);
        channel.publish('f', bData);
    }

    function createBullet(data, isMine) {
        const b = document.createElement('div');
        b.className = 'bullet';
        container.appendChild(b);
        let curX = data.x, curY = data.y, dist = 0;
        const rad = (data.angle - 90) * Math.PI / 180;
        const bLoop = setInterval(() => {
            curX += Math.cos(rad) * 15; curY += Math.sin(rad) * 15;
            b.style.left = curX + 'px'; b.style.top = curY + 'px';
            dist += 15;
            if (isMine) {
                for (let id in players) {
                    const p = players[id];
                    const tx = parseFloat(p.style.left), ty = parseFloat(p.style.top);
                    if (Math.hypot(curX - (tx + 20), curY - (ty + 20)) < 25) {
                        channel.publish('h', { targetId: id });
                        clearInterval(bLoop); b.remove(); return;
                    }
                }
            }
            if (dist > 600) { clearInterval(bLoop); b.remove(); }
        }, 20);
    }

    function handleHit(targetId) {
        if (targetId === myId) {
            myHealth -= 10;
            if (myHealth <= 0) {
                myHealth = 100;
                myPos = { x: Math.random() * (window.innerWidth-40), y: Math.random() * (window.innerHeight-40), angle: 0 };
            }
            updateHPUI(myId, myHealth);
            channel.publish('m', { ...myPos, hp: myHealth });
        }
        flashEffect(targetId);
    }

    function flashEffect(id) {
        const target = (id === myId) ? myTankEl : players[id];
        if (target && !target.dataset.flashing) {
            target.dataset.flashing = 'true';
            target.style.filter = 'brightness(3)';
            setTimeout(() => { target.style.filter = ''; delete target.dataset.flashing; }, 100);
        }
    }

    function generateItem() {
        const data = {
            itemId: 'it-' + Math.random().toString(36).substring(7),
            x: Math.random() * (window.innerWidth - 60) + 30,
            y: Math.random() * (window.innerHeight - 60) + 30,
            type: Math.random() > 0.5 ? 'heal' : 'speed'
        };
        channel.publish('i', data);
    }

    function spawnItem(data) {
        const el = document.createElement('div');
        el.className = `item item-${data.type}`;
        el.innerText = data.type === 'heal' ? '✚' : '⚡';
        el.style.left = data.x + 'px'; el.style.top = data.y + 'px';
        container.appendChild(el);
        items[data.itemId] = { el, ...data };
    }

    function removeItem(itemId) {
        if (items[itemId]) { items[itemId].el.remove(); delete items[itemId]; }
    }

    function initJoystick() {
        const joy = document.getElementById('joystick-container');
        const move = (e) => {
            if (!joystickActive) return;
            const t = e.touches ? e.touches[0] : e;
            const r = joy.getBoundingClientRect();
            const dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
            const d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const a = Math.atan2(dy, dx);
            knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            joystickVector = { x: (Math.cos(a)*d)/50, y: (Math.sin(a)*d)/50 };
        };
        joy.addEventListener('pointerdown', () => joystickActive = true);
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', () => { joystickActive = false; knob.style.transform = 'translate(0,0)'; joystickVector = {x:0,y:0}; });
    }

    function startLoop() {
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => { if (e.key === ' ') triggerFire(); keys[e.key.toLowerCase()] = false; };

        setInterval(() => {
            let moved = false;
            if (keys['w']) { myPos.y -= mySpeed; myPos.angle = 0; moved = true; }
            else if (keys['s']) { myPos.y += mySpeed; myPos.angle = 180; moved = true; }
            else if (keys['a']) { myPos.x -= mySpeed; myPos.angle = 270; moved = true; }
            else if (keys['d']) { myPos.x += mySpeed; myPos.angle = 90; moved = true; }
            else if (joystickVector.x !== 0 || joystickVector.y !== 0) {
                myPos.x += joystickVector.x * mySpeed; myPos.y += joystickVector.y * mySpeed;
                const deg = Math.atan2(joystickVector.y, joystickVector.x) * 180 / Math.PI + 90;
                myPos.angle = Math.round(deg/90)*90; moved = true;
            }

            if (moved) {
                syncPos(myTankEl, myPos);
                for (let id in items) {
                    const it = items[id];
                    if (Math.hypot(myPos.x + 20 - (it.x + 12), myPos.y + 20 - (it.y + 12)) < 30) {
                        if (it.type === 'heal') { myHealth = Math.min(100, myHealth + 30); updateHPUI(myId, myHealth); }
                        else { mySpeed = 10; setTimeout(() => mySpeed = 5, 5000); }
                        channel.publish('d', { itemId: id });
                    }
                }
                // 限制同步频率：位移大于 2px 才发包
                if (Math.hypot(myPos.x - lastSentPos.x, myPos.y - lastSentPos.y) > 2 || myPos.angle !== lastSentPos.angle) {
                    channel.publish('m', { ...myPos, hp: myHealth });
                    lastSentPos = { ...myPos };
                }
            }
        }, 60);
    }

    function updateCountDisplay(n) { countEl.textContent = n; }
    init();
</script>
</body>
</html>
