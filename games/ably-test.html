<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Findor's Tank | Canvas 引擎版</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        body { margin: 0; background: #1a1a1b; color: white; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #game-canvas { display: block; background: #202124; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; font-size: 14px; }
        #ctrl { position: fixed; bottom: 40px; left: 40px; right: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        #joystick-container { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; }
        #joystick-knob { width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; position: absolute; left: 35px; top: 35px; }
        #fire-btn { width: 80px; height: 80px; background: rgba(186, 26, 26, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

<div id="ui">
    <div>状态: <span id="status">初始化...</span></div>
    <div>ID: <span id="my-id">-</span></div>
    <div>在线: <span id="count">0</span></div>
    <div style="color: #ffeb3b;">提示: 房主负责生成道具</div>
</div>

<canvas id="game-canvas"></canvas>

<div id="ctrl">
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="fire-btn">FIRE</div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('my-id');
    const countEl = document.getElementById('count');
    const knob = document.getElementById('joystick-knob');

    // 基础配置
    const myId = 'Tank-' + Math.random().toString(36).substring(7);
    let channel;
    let isHost = false;
    let myPos = { x: 200, y: 200, angle: 0, hp: 100 };
    let lastSent = { x: 0, y: 0, angle: 0 };
    let mySpeed = 4;
    
    const players = {}; 
    const bullets = [];
    const items = {};
    
    // 输入状态
    const keys = {};
    let joystickVector = { x: 0, y: 0 };
    let joystickActive = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    async function init() {
        try {
            const response = await fetch('/api/auth');
            const apiKey = await response.text();
            const ably = new Ably.Realtime({ key: apiKey.trim(), clientId: myId });
            
            ably.connection.on('connected', () => {
                statusEl.textContent = "✅ 已联机";
                checkHost();
            });

            channel = ably.channels.get('game-room');
            myIdEl.textContent = myId;

            // 消息订阅
            channel.subscribe('m', (m) => { if(m.clientId !== myId) players[m.clientId] = m.data; });
            channel.subscribe('f', (m) => { if(m.clientId !== myId) spawnBullet(m.data, false); });
            channel.subscribe('h', (m) => { if(m.data.targetId === myId) takeDamage(); });
            channel.subscribe('i', (m) => { items[m.data.id] = m.data; });
            channel.subscribe('d', (m) => { delete items[m.data.id]; });

            // 玩家进出
            channel.presence.subscribe('enter', checkHost);
            channel.presence.subscribe('leave', (m) => { delete players[m.clientId]; checkHost(); });

            await channel.presence.enter();
            checkHost();

            // 启动核心循环
            requestAnimationFrame(gameLoop);
            
            // 房主生成道具循环
            setInterval(() => { if(isHost) broadcastItem(); }, 8000);

        } catch (err) { statusEl.textContent = "❌ 连接失败"; }
    }

    // --- 增强版房主逻辑 ---
async function checkHost() {
    try {
        // 等待 Presence 列表同步
        const members = await channel.presence.get();
        if (members && members.length > 0) {
            const sorted = members.sort((a, b) => a.timestamp - b.timestamp);
            const hostId = sorted[0].clientId;
            isHost = (hostId === myId);
            
            countEl.textContent = members.length;
            statusEl.textContent = isHost ? "✅ 已联机 (房主)" : "✅ 已联机 (从机)";
        } else {
            // 如果列表为空（常见于刚连接时），则暂时认为自己是房主以维持逻辑
            isHost = true; 
            statusEl.textContent = "⏳ 正在同步房主...";
        }
    } catch (e) {
        console.error("无法获取房主状态:", e);
    }
}

// --- 坐标校准版道具生成 ---
function broadcastItem() {
    // 使用 0.1 到 0.9 的比例，确保道具不会贴边
    const itemData = {
        id: 'it-' + Math.random().toString(36).substring(7),
        ratioX: 0.1 + Math.random() * 0.8, 
        ratioY: 0.1 + Math.random() * 0.8,
        type: Math.random() > 0.5 ? 'heal' : 'speed'
    };
    
    // 房主直接发布
    channel.publish('i', itemData);
    console.log("房主已发布新道具:", itemData.id);
}

    // --- 碰撞检测适配 ---
function checkItemCollision() {
    for (let id in items) {
        const it = items[id];
        const realX = it.ratioX * canvas.width;
        const realY = it.ratioY * canvas.height;
        
        // 坦克中心点对比道具中心点
        const dist = Math.hypot((myPos.x + 20) - realX, (myPos.y + 20) - realY);
        
        if (dist < 35) { // 碰撞半径
            if (it.type === 'heal') {
                myPos.hp = Math.min(100, myPos.hp + 20);
                console.log("吃到加血道具");
            } else {
                mySpeed = 7;
                setTimeout(() => mySpeed = 4, 5000);
                console.log("吃到加速道具");
            }
            // 通知频道删除该道具
            channel.publish('d', { id: id });
            delete items[id];
        }
    }
}

    function spawnBullet(data, isMine) {
        bullets.push({
            x: data.x, y: data.y, angle: data.angle,
            dist: 0, isMine: isMine, active: true
        });
    }

    function takeDamage() {
        myPos.hp -= 10;
        if(myPos.hp <= 0) {
            myPos.hp = 100;
            myPos.x = Math.random() * (canvas.width - 40);
            myPos.y = Math.random() * (canvas.height - 40);
        }
        channel.publish('m', myPos);
    }

    // --- 渲染引擎 ---

    function drawTank(ctx, x, y, angle, label, hp, color) {
        ctx.save();
        ctx.translate(x + 20, y + 20);

        // 1. 绘制血条（不随坦克旋转，固定在头顶）
        ctx.save();
        ctx.fillStyle = "#444";
        ctx.fillRect(-20, -35, 40, 5);
        ctx.fillStyle = hp > 30 ? "#4caf50" : "#f44336";
        ctx.fillRect(-20, -35, 40 * (hp / 100), 5);
        ctx.restore();

        // 2. 绘制名称
        ctx.fillStyle = "white";
        ctx.font = "10px Arial";
        ctx.textAlign = "center";
        ctx.fillText(label, 0, -40);

        // 3. 绘制坦克主体（应用旋转）
        ctx.rotate(angle * Math.PI / 180);
        ctx.fillStyle = color;
        ctx.fillRect(-20, -20, 40, 40);
        // 炮管
        ctx.fillStyle = "#ccc";
        ctx.fillRect(-2, -30, 4, 15);
        
        ctx.restore();
    }

    function gameLoop() {
        update();
        render();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        let moved = false;
        let vx = 0, vy = 0;

        // 键盘输入
        if (keys['w']) { vy = -mySpeed; myPos.angle = 0; moved = true; }
        else if (keys['s']) { vy = mySpeed; myPos.angle = 180; moved = true; }
        else if (keys['a']) { vx = -mySpeed; myPos.angle = 270; moved = true; }
        else if (keys['d']) { vx = mySpeed; myPos.angle = 90; moved = true; }
        // 摇杆输入
        else if (joystickVector.x !== 0 || joystickVector.y !== 0) {
            vx = joystickVector.x * mySpeed;
            vy = joystickVector.y * mySpeed;
            const deg = Math.atan2(joystickVector.y, joystickVector.x) * 180 / Math.PI + 90;
            myPos.angle = Math.round(deg / 90) * 90;
            moved = true;
        }

        if (moved) {
            myPos.x = Math.max(0, Math.min(canvas.width - 40, myPos.x + vx));
            myPos.y = Math.max(0, Math.min(canvas.height - 40, myPos.y + vy));

            // 碰撞道具
            for (let id in items) {
                const it = items[id];
                if (Math.hypot(myPos.x + 20 - it.x, myPos.y + 20 - it.y) < 30) {
                    if (it.type === 'heal') myPos.hp = Math.min(100, myPos.hp + 30);
                    else { mySpeed = 8; setTimeout(() => mySpeed = 4, 5000); }
                    channel.publish('d', { id: id });
                    delete items[id];
                }
            }

            // 网络同步频率优化
            if (Math.hypot(myPos.x - lastSent.x, myPos.y - lastSent.y) > 2 || myPos.angle !== lastSent.angle) {
                channel.publish('m', myPos);
                lastSent = { ...myPos };
            }
        }

        // 更新子弹
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            const rad = (b.angle - 90) * Math.PI / 180;
            b.x += Math.cos(rad) * 12;
            b.y += Math.sin(rad) * 12;
            b.dist += 12;

            if (b.isMine) {
                for (let pid in players) {
                    const p = players[pid];
                    if (Math.hypot(b.x - (p.x + 20), b.y - (p.y + 20)) < 25) {
                        channel.publish('h', { targetId: pid });
                        b.active = false;
                    }
                }
            }

            if (b.dist > 800 || !b.active) bullets.splice(i, 1);
        }
    }

    function render() {
       ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 绘制道具 (使用比例还原坐标)
    for (let id in items) {
        const it = items[id];
        const realX = it.ratioX * canvas.width;
        const realY = it.ratioY * canvas.height;
        
        ctx.beginPath();
        ctx.arc(realX, realY, 15, 0, Math.PI * 2);
        ctx.fillStyle = it.type === 'heal' ? '#4caf50' : '#2196f3';
        ctx.fill();
        
        // 发光效果
        ctx.shadowBlur = 10;
        ctx.shadowColor = ctx.fillStyle;
        
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(it.type === 'heal' ? '+' : 'S', realX, realY + 5);
        ctx.shadowBlur = 0; // 重置阴影
    }

        // 绘图层级：1. 道具 -> 2. 子弹 -> 3. 坦克

        // 1. 道具
        for (let id in items) {
            const it = items[id];
            ctx.beginPath();
            ctx.arc(it.x, it.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = it.type === 'heal' ? '#4caf50' : '#2196f3';
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.fillText(it.type === 'heal' ? '+' : '⚡', it.x, it.y + 4);
        }

        // 2. 子弹
        for (const b of bullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = "#ffff00";
            ctx.fill();
        }

        // 3. 坦克
        drawTank(ctx, myPos.x, myPos.y, myPos.angle, "ME", myPos.hp, "#0061a4");
        for (let id in players) {
            const p = players[id];
            drawTank(ctx, p.x, p.y, p.angle, id.substring(5, 9), p.hp || 100, "#ba1a1a");
        }
    }

    // --- 输入控制 ---

    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => { 
        if (e.key === ' ') fire();
        keys[e.key.toLowerCase()] = false; 
    };

    function fire() {
        const data = { x: myPos.x + 20, y: myPos.y + 20, angle: myPos.angle };
        spawnBullet(data, true);
        channel.publish('f', data);
    }

    document.getElementById('fire-btn').addEventListener('pointerdown', (e) => { e.preventDefault(); fire(); });

    const joy = document.getElementById('joystick-container');
    joy.addEventListener('pointerdown', () => joystickActive = true);
    window.addEventListener('pointermove', (e) => {
        if (!joystickActive) return;
        const r = joy.getBoundingClientRect();
        const center = { x: r.left + 60, y: r.top + 60 };
        const dx = e.clientX - center.x, dy = e.clientY - center.y;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const angle = Math.atan2(dy, dx);
        knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        joystickVector = { x: (Math.cos(angle)*dist)/50, y: (Math.sin(angle)*dist)/50 };
    });
    window.addEventListener('pointerup', () => {
        joystickActive = false;
        knob.style.transform = 'translate(0,0)';
        joystickVector = { x: 0, y: 0 };
    });

    init();
</script>
</body>
</html>
