<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>多人实时对战测试 | Findor's Space</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        body { margin: 0; background: #202124; color: white; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #1a1a1b; }
        #ui { position: fixed; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>状态: <span id="status">连接中...</span></div>
        <div>在线玩家: <span id="player-count">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let channel;
        const players = {}; // 存储所有玩家数据
        let myId = 'user_' + Math.random().toString(36).substring(7);
        
        // 本地玩家状态
        const me = {
            id: myId,
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            angle: 0,
            color: '#0061a4',
            lastSent: 0
        };

        async function initGame() {
            const ably = new Ably.Realtime({ authUrl: '/api/auth' });
            await ably.connection.once('connected');
            document.getElementById('status').textContent = "已联机";

            channel = ably.channels.get('game-room-1');

            // 1. 订阅位置同步 (广播)
            channel.subscribe('u', (msg) => {
                if (msg.clientId === myId) return;
                const data = msg.data;
                if (!players[data.id]) {
                    players[data.id] = { ...data, targetX: data.x, targetY: data.y };
                } else {
                    // 记录目标位置用于插值
                    players[data.id].targetX = data.x;
                    players[data.id].targetY = data.y;
                    players[data.id].angle = data.a;
                }
            });

            // 2. 玩家进出管理
            channel.presence.subscribe('enter', (member) => updatePlayerCount());
            channel.presence.subscribe('leave', (member) => {
                delete players[member.clientId];
                updatePlayerCount();
            });
            await channel.presence.enter({ color: me.color });
            
            gameLoop();
        }

        function updatePlayerCount() {
            channel.presence.get((err, members) => {
                if (!err) document.getElementById('player-count').textContent = members.length;
            });
        }

        // 核心游戏循环
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            let moved = false;
            const speed = 4;
            // 简单的键盘处理 (此处省略具体按键监听逻辑，假设使用 WASD)
            // if (keys['w']) { me.y -= speed; me.angle = 0; moved = true; }
            
            // 模拟平滑移动远程玩家 (插值)
            for (let id in players) {
                const p = players[id];
                p.x += (p.targetX - p.x) * 0.2; // 线性插值线性
                p.y += (p.targetY - p.y) * 0.2;
            }

            // 频率限制发送：每 50ms 发送一次位置
            const now = Date.now();
            if (moved && now - me.lastSent > 50) {
                channel.publish('u', { id: myId, x: me.x, y: me.y, a: me.angle });
                me.lastSent = now;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制自己
            drawTank(me.x, me.y, me.angle, me.color, "我");

            // 绘制其他玩家
            for (let id in players) {
                const p = players[id];
                drawTank(p.x, p.y, p.angle, '#ba1a1a', id.substring(0, 4));
            }
        }

        function drawTank(x, y, angle, color, label) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.fillStyle = color;
            ctx.fillRect(-20, -20, 40, 40); // 坦克主体
            ctx.fillStyle = "#333";
            ctx.fillRect(-2, -25, 4, 20); // 炮管
            ctx.restore();
            
            ctx.fillStyle = "white";
            ctx.fillText(label, x - 15, y + 35);
        }

        initAbly();
    </script>
</body>
</html>
