<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Findor's Multiplayer Tank | 暴力联机版</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        body { margin: 0; background: #202124; color: white; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: #1a1a1b; }
        .tank { 
            position: absolute; width: 40px; height: 40px; 
            background: #0061a4; border-radius: 4px; 
            transition: transform 0.1s linear, left 0.1s linear, top 0.1s linear;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: white;
        }
        .tank::after { /* 炮管 */
            content: ''; position: absolute; top: -10px; left: 18px; 
            width: 4px; height: 15px; background: #333; 
        }
        .remote { background: #ba1a1a; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 100; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="ui">
    <div>状态: <span id="status">正在获取秘钥...</span></div>
    <div>我的 ID: <span id="my-id">-</span></div>
    <div>在线坦克: <span id="count">1</span></div>
</div>

<div id="game-container"></div>

<script>
    const container = document.getElementById('game-container');
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('my-id');
    const countEl = document.getElementById('count');

    const myId = 'Tank-' + Math.random().toString(36).substring(7);
    const players = {}; 
    let channel;
    let myPos = { x: 100, y: 100, angle: 0 };
    let myTankEl;

    // 1. 初始化并暴力获取 Key
    async function init() {
        try {
            const response = await fetch('/api/auth');
            const apiKey = await response.text();

            if (!apiKey.includes(':')) throw new Error("Key 格式错误");

            const ably = new Ably.Realtime({ 
                key: apiKey.trim(),
                clientId: myId 
            });

            await ably.connection.once('connected');
            statusEl.textContent = "✅ 已联机";
            myIdEl.textContent = myId;

            channel = ably.channels.get('game-room');

            // 2. 订阅位置更新
            await channel.subscribe('m', (msg) => {
                if (msg.clientId === myId) return;
                updateRemotePlayer(msg.clientId, msg.data);
            });

            // 3. 订阅在场信息 (处理玩家离开)
            channel.presence.subscribe('leave', (member) => {
                if (players[member.clientId]) {
                    players[member.clientId].remove();
                    delete players[member.clientId];
                    updateCount();
                }
            });
            await channel.presence.enter();
            updateCount();

            createMyTank();
            startLoop();

        } catch (err) {
            statusEl.textContent = "❌ 连接失败: " + err.message;
        }
    }

    function createMyTank() {
        myTankEl = document.createElement('div');
        myTankEl.className = 'tank';
        myTankEl.innerText = 'ME';
        container.appendChild(myTankEl);
        syncPos(myTankEl, myPos);
    }

    function updateRemotePlayer(id, data) {
        if (!players[id]) {
            const el = document.createElement('div');
            el.className = 'tank remote';
            el.innerText = id.substring(5, 9);
            container.appendChild(el);
            players[id] = el;
            updateCount();
        }
        syncPos(players[id], data);
    }

    function syncPos(el, data) {
        el.style.left = data.x + 'px';
        el.style.top = data.y + 'px';
        el.style.transform = `rotate(${data.angle}deg)`;
    }

    function updateCount() {
        channel.presence.get((err, members) => {
            if (!err) countEl.textContent = members.length;
        });
    }

    // 4. 控制与同步循环
    function startLoop() {
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        setInterval(() => {
            let moved = false;
            const step = 5;
            if (keys['w']) { myPos.y -= step; myPos.angle = 0; moved = true; }
            if (keys['s']) { myPos.y += step; myPos.angle = 180; moved = true; }
            if (keys['a']) { myPos.x -= step; myPos.angle = 270; moved = true; }
            if (keys['d']) { myPos.x += step; myPos.angle = 90; moved = true; }

            if (moved) {
                syncPos(myTankEl, myPos);
                // 使用简写 'm' (move) 节省流量
                channel.publish('m', myPos);
            }
        }, 30); // 约 33 FPS 同步率
    }

    init();
</script>

</body>
</html>
