<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Ably 多人游戏测试</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <style>
        #game { width: 600px; height: 400px; border: 2px solid #333; position: relative; background: #eee; }
        .tank { width: 30px; height: 30px; position: absolute; background: #0061a4; transition: 0.1s; }
        .remote { background: #ba1a1a; }
    </style>
</head>
<body>
    <h1>联机坦克 (WASD 移动)</h1>
    <div id="game"></div>

    <script>
        let channel;
        const myId = 'player-' + Math.random().toString(36).substring(7);
        const tanks = {};

        async function start() {
            // 强制修正模式：通过回调函数手动控制数据进入 SDK 的格式
    const ably = new Ably.Realtime({ 
        clientId: myId,
        authCallback: async (tokenParams, callback) => {
            try {
                const response = await fetch('/api/auth');
                const data = await response.json();

                // 核心修复逻辑：Ably SDK 对 timestamp 类型极其挑剔
                // 如果后端返回的是字符串，这里强制转为 Number
                if (data.timestamp) {
                    data.timestamp = Number(data.timestamp);
                }

                // 如果返回的对象里套了层 "error"，说明后端报错了，透传给 SDK
                if (data.error) {
                    console.error("后端认证失败:", data.error);
                    callback(data.error, null);
                    return;
                }

                // 成功：将纯净的、类型正确的 TokenRequest 交给 Ably
                callback(null, data);
            } catch (err) {
                console.error("网络请求异常:", err);
                callback(err, null);
            }
        }
    });

    // 监听连接状态
    ably.connection.on('connected', () => {
        console.log("✅ 坦克已上线！ID:", myId);
    });

    await ably.connection.once('connected');

    channel = ably.channels.get('game-room');

    // 订阅逻辑... (保持不变)
    await channel.subscribe('move', (msg) => {
        if (msg.clientId === myId) return;
        updateTank(msg.clientId, msg.data, true);
    });
            // 自己移动
            window.onkeydown = (e) => {
                const pos = { x: parseInt(myTank.style.left || 0), y: parseInt(myTank.style.top || 0) };
                if (e.key === 'w') pos.y -= 10;
                if (e.key === 's') pos.y += 10;
                if (e.key === 'a') pos.x -= 10;
                if (e.key === 'd') pos.x += 10;
                
                myTank.style.left = pos.x + 'px';
                myTank.style.top = pos.y + 'px';
                channel.publish('move', pos);
            };
        }

        const myTank = document.createElement('div');
        myTank.className = 'tank';
        document.getElementById('game').appendChild(myTank);

        function updateTank(id, pos, isRemote) {
            if (!tanks[id]) {
                const el = document.createElement('div');
                el.className = 'tank' + (isRemote ? ' remote' : '');
                document.getElementById('game').appendChild(el);
                tanks[id] = el;
            }
            tanks[id].style.left = pos.x + 'px';
            tanks[id].style.top = pos.y + 'px';
        }

        start();
    </script>
</body>
</html>
