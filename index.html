<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>Findor | 3D坦克玩家空间</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css" />
    <script type="module" src="https://unpkg.com/mdui@2/mdui.global.js"></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            /* 使用 MDUI 2 的设计令牌，确保背景色符合 M3 标准 */
            background-color: var(--mdui-color-surface-container-low);
            color: var(--mdui-color-on-surface);
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 布局容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        /* 顶部横幅 */
        .header-banner {
            background-color: var(--mdui-color-primary-container);
            color: var(--mdui-color-on-primary-container);
            padding: 64px 24px;
            text-align: center;
            border-radius: 0 0 32px 32px;
            margin-bottom: 24px;
        }

        /* 实时在线人数大卡片 */
        .online-stats-card {
            background-color: var(--mdui-color-secondary-container);
            color: var(--mdui-color-on-secondary-container);
            margin-bottom: 24px;
        }

        .online-number {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1.1;
            margin: 16px 0;
        }

        /* 列表微调 */
        mdui-list {
            background: transparent;
        }

        footer {
            padding: 32px 16px;
            text-align: center;
            opacity: 0.7;
        }

        /* 悬浮切换按钮位置 */
        #theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
        }
    </style>
</head>

<body class="mdui-theme-light"> <mdui-button-icon id="theme-toggle" icon="light_mode" variant="filled-tonal"></mdui-button-icon>

    <header class="header-banner mdui-shadow-1">
        <mdui-typography variant="display-medium">Findor 的空间</mdui-typography>
        <mdui-typography variant="title-medium" style="opacity: 0.8; margin-top: 8px;">
            3D坦克 (Tanki Online) 技术玩家
        </mdui-typography>
    </header>

    <main class="container">
        
        <mdui-card style="padding: 24px; margin-bottom: 24px;" variant="elevated">
            <mdui-typography variant="title-large" style="color: var(--mdui-color-primary); margin-bottom: 12px;">关于我</mdui-typography>
            <mdui-typography variant="body-large">
                欢迎来到我的个人主页。我是一名热爱 <strong>3D坦克</strong> 的玩家，专注于游戏机制研究和测试服动态监测。
            </mdui-typography>
            <div style="margin-top: 16px;">
                <mdui-button href="https://space.bilibili.com/1863175083" target="_blank" variant="text" icon="play_circle">
                    Bilibili 日常分享
                </mdui-button>
            </div>
        </mdui-card>

        <mdui-card class="online-stats-card" style="padding: 24px;" variant="filled">
            <mdui-typography variant="label-large" style="letter-spacing: 2px;">全服实时在线</mdui-typography>
            
            <div id="v_online" class="online-number">---</div>
            
            <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                <mdui-chip variant="filled" icon="fireplace">战斗中: <span id="v_battle">---</span></mdui-chip>
                <mdui-chip variant="filled" icon="bolt">4399 渠道: <span id="v_4399">---</span></mdui-chip>
            </div>
        </mdui-card>

        <mdui-card variant="outlined" style="padding: 8px; margin-bottom: 24px;">
            <mdui-list>
                <mdui-list-item icon="language" href="https://tankionline.com" target="_blank" end-icon="arrow_forward">官方网站</mdui-list-item>
                <mdui-list-item icon="public" href="https://3dtank.com" target="_blank" end-icon="arrow_forward">国服官网</mdui-list-item>
                <mdui-divider></mdui-divider>
                <mdui-list-item icon="folder_open" href="files" target="_blank" end-icon="arrow_forward">文件中心</mdui-list-item>
                <mdui-list-item icon="build" href="test.html" target="_blank" end-icon="arrow_forward">测试服动态</mdui-list-item>
                <mdui-list-item icon="forum" href="chat" target="_blank" end-icon="arrow_forward">聊天房</mdui-list-item>
                <mdui-list-item icon="chat" href="comments" target="_blank" end-icon="arrow_forward">留言区</mdui-list-item>
                <mdui-divider></mdui-divider>
                <mdui-list-item icon="menu_book" href="https://en.tankiwiki.com" target="_blank" end-icon="arrow_forward">游戏维基</mdui-list-item>
            </mdui-list>
        </mdui-card>

        <mdui-card variant="filled" style="padding: 24px; background-color: var(--mdui-color-surface-container-high);">
            <mdui-typography variant="title-medium" style="margin-bottom: 12px;">当前项目</mdui-typography>
            <mdui-list style="padding: 0;">
                <mdui-list-item nonclickable>
                    <mdui-icon slot="icon" name="monitor"></mdui-icon>
                    Findor's Monitor
                    <span slot="description">实时监测测试服版本更新（开发中）</span>
                </mdui-list-item>
            </mdui-list>
        </mdui-card>

    </main>

    <footer>
        <mdui-button-icon href="https://github.com/findor26/findorp.pages.dev" target="_blank" icon="code"></mdui-button-icon>
        <mdui-typography variant="label-medium" style="display: block; margin-top: 12px;">
            &copy; 2026 Findor. 基于 Cloudflare Pages 托管.
        </mdui-typography>
    </footer>

    <script src="main.js">
    </script>
</body>
</html>
