function showToast(msg, isError = true) {

async function fetchRawFile(repo, branch, path, type = 'arraybuffer') {
    const url = `https://raw.githubusercontent.com/${repo}/${branch}/${path}`;
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${path}`);
        return type === 'json' ? await res.json() : await res.arrayBuffer();
    } catch (err) {
        throw new Error(`${err.message} (Network Error)`);
    }
}

class BinaryStream {
    constructor(buffer) {
        this.buffer = new Uint8Array(buffer);
        this.view = new DataView(this.buffer.buffer, this.buffer.byteOffset, this.buffer.byteLength);
        this.offset = 0;
    }
    readUint8() { const v = this.view.getUint8(this.offset); this.offset += 1; return v; }
    readUint16(le = false) { const v = this.view.getUint16(this.offset, le); this.offset += 2; return v; }
    readUint32(le = false) { const v = this.view.getUint32(this.offset, le); this.offset += 4; return v; }
    readInt32(le = false) { const v = this.view.getInt32(this.offset, le); this.offset += 4; return v; }
    readFloat32(le = false) { const v = this.view.getFloat32(this.offset, le); this.offset += 4; return v; }
    readFloat64(le = false) { const v = this.view.getFloat64(this.offset, le); this.offset += 8; return v; }
    readBytes(len) { const v = this.buffer.subarray(this.offset, this.offset + len); this.offset += len; return v; }
    readStringLength() {
        const flags = this.readUint8();
        if ((flags & 0b10000000) === 0) return flags & 0b01111111;
        if ((flags & 0b01000000) === 0) return ((flags & 0b00111111) << 8) + this.readUint8();
        return ((flags & 0b00111111) << 16) + this.readUint16(false);
    }
    readString() { return new TextDecoder().decode(this.readBytes(this.readStringLength())); }
    readNullTerminatedString() {
        let str = "";
        while(true) {
            const char = this.readUint8();
            if (char === 0) break;
            str += String.fromCharCode(char);
        }
        return str;
    }
    readLengthPrefixedStringA3D() {
        const len = this.readUint32(true);
        const str = new TextDecoder().decode(this.readBytes(len));
        this.offset += (((len + 3) >> 2) << 2) - len; 
        return str;
    }
}

class BinaryWriter {
    constructor() { this.chunks = []; this.length = 0; }
    writeUint8(v) { this._add(new Uint8Array([v])); }
    writeUint16(v, le = false) { const b = new Uint8Array(2); new DataView(b.buffer).setUint16(0, v, le); this._add(b); }
    writeUint32(v, le = false) { const b = new Uint8Array(4); new DataView(b.buffer).setUint32(0, v, le); this._add(b); }
    writeFloat32(v, le = false) { const b = new Uint8Array(4); new DataView(b.buffer).setFloat32(0, v, le); this._add(b); }
    writeBytes(b) { this._add(b); }
    writeStringLength(len) {
        if (len <= 0b01111111) { this.writeUint8(len); } 
        else if (len <= 0x3FFF) { this.writeUint8(0b10000000 | (len >> 8)); this.writeUint8(len & 0xFF); } 
        else { this.writeUint8(0b11000000 | (len >> 16)); this.writeUint16(len & 0xFFFF, false); }
    }
    writeString(str) { const bytes = new TextEncoder().encode(str); this.writeStringLength(bytes.length); this.writeBytes(bytes); }
    _add(b) { this.chunks.push(b); this.length += b.length; }
    toUint8Array() {
        const res = new Uint8Array(this.length);
        let offset = 0;
        for(const chunk of this.chunks) { res.set(chunk, offset); offset += chunk.length; }
        return res;
    }
}

async function decompressZlib(uint8array) {
    const ds = new DecompressionStream("deflate");
    const writer = ds.writable.getWriter();
    writer.write(uint8array);
    writer.close();
    return new Uint8Array(await new Response(ds.readable).arrayBuffer());
}

async function unwrapPacket(stream) {
    const flags = stream.readUint8();
    const compressed = (flags & 0b01000000) > 0;
    let len = 0;
    if ((flags & 0b10000000) === 0) {
        len = stream.readUint8() + ((flags & 0b00111111) << 8);
    } else {
        const b1 = stream.readUint8(), b2 = stream.readUint8(), b3 = stream.readUint8();
        len = (b1 << 16) | (b2 << 8) | b3;
        len += (flags & 0b00111111) * 16777216;
    }
    let data = stream.readBytes(len);
    if (compressed) data = await decompressZlib(data);
    return new BinaryStream(data);
}

function packHeader(bits) {
    const extCount = Math.ceil(bits.length / 8);
    const extBytes = new Uint8Array(extCount);
    extBytes.fill(255);
    for(let i = 0; i < bits.length; i++) {
        if (bits[i]) {
            const byteIdx = Math.floor(i / 8);
            const bitIdx = 7 - (i % 8);
            extBytes[byteIdx] &= ~(1 << bitIdx);
        }
    }
    let flags = 0b10000000;
    let headerPrefix;
    if (extCount <= 63) {
        flags |= extCount;
        headerPrefix = new Uint8Array([flags]);
    } else {
        flags |= 0b01000000;
        flags |= (extCount >> 16) & 0b00111111;
        headerPrefix = new Uint8Array(3);
        headerPrefix[0] = flags;
        new DataView(headerPrefix.buffer).setUint16(1, extCount & 0xFFFF, false);
    }
    return { headerPrefix, extBytes };
}

async function wrapPacketCompressed(payload) {
    const cs = new CompressionStream("deflate");
    const writer = cs.writable.getWriter();
    writer.write(payload);
    writer.close();
    const compressed = new Uint8Array(await new Response(cs.readable).arrayBuffer());
    
    const bw = new BinaryWriter();
    const len = compressed.length;
    const flags = 0b11000000 | ((len >> 24) & 0b00111111);
    bw.writeUint8(flags);
    bw.writeUint8((len >> 16) & 0xFF);
    bw.writeUint8((len >> 8) & 0xFF);
    bw.writeUint8(len & 0xFF);
    bw.writeBytes(compressed);
    return bw.toUint8Array();
}

const A3D_VERTEXTYPE = { 1:3, 2:2, 3:3, 4:2, 5:4, 6:3 }; 
function parseA3D(buffer) {
    const stream = new BinaryStream(buffer);
    const sig = new TextDecoder().decode(stream.readBytes(4));
    if (sig !== "A3D\0") throw new Error("Invalid A3D signature");
    const version = stream.readUint16(true);
    stream.readUint16(true); 

    stream.readUint32(true);
    stream.readUint32(true);

    const data = { meshes: [] };

    const matSig = stream.readUint32(true);
    const matLen = stream.readUint32(true); 
    const matCount = stream.readUint32(true);

    for(let i=0; i<matCount; i++) {
        if(version===3) { stream.readLengthPrefixedStringA3D(); stream.offset+=12; stream.readLengthPrefixedStringA3D(); }
        else { stream.readNullTerminatedString(); stream.offset+=12; stream.readNullTerminatedString(); }
    }
    if(version===3) stream.offset += (((matLen + 3) >> 2) << 2) - matLen; 

    const meshSig = stream.readUint32(true);
    const meshLen = stream.readUint32(true); 
    const meshCount = stream.readUint32(true);
    
    for(let i=0; i<meshCount; i++) {
        if(version===3) { stream.readLengthPrefixedStringA3D(); stream.offset += 28; }
        const vertexCount = stream.readUint32(true);
        const vBufCount = stream.readUint32(true);
        const buffers = [];
        for(let b=0; b<vBufCount; b++) {
            const bType = stream.readUint32(true);
            const numFloats = A3D_VERTEXTYPE[bType];
            const byteLen = vertexCount * numFloats * 4;
            const sliceBuf = stream.buffer.slice(stream.offset, stream.offset + byteLen);
            buffers.push({ type: bType, data: new Float32Array(sliceBuf.buffer, sliceBuf.byteOffset, vertexCount * numFloats) });
            stream.offset += byteLen;
        }
        
        const submeshCount = stream.readUint32(true);
        const submeshes = [];
        for(let s=0; s<submeshCount; s++) {
            if(version===2) {
                const fCount = stream.readUint32(true);
                const iCount = fCount * 3;
                const sliceBuf = stream.buffer.slice(stream.offset, stream.offset + iCount * 2);
                stream.offset += iCount * 2 + fCount * 4; 
                submeshes.push({ indices: new Uint16Array(sliceBuf.buffer, sliceBuf.byteOffset, iCount), matId: stream.readUint16(true) });
            } else {
                const iCount = stream.readUint32(true);
                const sliceBuf = stream.buffer.slice(stream.offset, stream.offset + iCount * 2);
                stream.offset += iCount * 2;
                stream.offset += (((iCount * 2 + 3) >> 2) << 2) - (iCount * 2); 
                submeshes.push({ indices: new Uint16Array(sliceBuf.buffer, sliceBuf.byteOffset, iCount), matId: 0 });
            }
        }
        
        const geo = new THREE.BufferGeometry();
        let mainIndices = [];
        submeshes.forEach((sm, idx) => {
            const start = mainIndices.length;
            mainIndices.push(...sm.indices);
            geo.addGroup(start, sm.indices.length, idx);
        });
        geo.setIndex(mainIndices);

        buffers.forEach(buf => {
            if(buf.type === 1) geo.setAttribute('position', new THREE.BufferAttribute(buf.data, 3));
            else if(buf.type === 2) geo.setAttribute('uv', new THREE.BufferAttribute(buf.data, 2));
            else if(buf.type === 3) geo.setAttribute('normal', new THREE.BufferAttribute(buf.data, 3));
        });
        
        if (!geo.attributes.normal) geo.computeVertexNormals();
        data.meshes.push(geo);
    }
    return data;
}

window.repackingData = null;

async function parseMapBin(buffer) {
    const stream = new BinaryStream(buffer);
    const packet = await unwrapPacket(stream);
    
    let headerEndOffset = 0;
    const fullOriginalBits = [];
    const flags = packet.readUint8();
    if ((flags & 0b10000000) === 0) {
        const intBits = flags << 3;
        for (let i = 7; i >= 3; i--) fullOriginalBits.push((intBits & (1 << i)) === 0);
        const extCount = (flags & 0b01100000) >> 5;
        const extBytes = packet.readBytes(extCount);
        for (let i = 0; i < extBytes.length; i++) for (let b = 7; b >= 0; b--) fullOriginalBits.push((extBytes[i] & (1 << b)) === 0);
    } else {
        let extCount = ((flags & 0b01000000) === 0) ? (flags & 0b00111111) : (((flags & 0b00111111) << 16) + packet.readUint16(false));
        const extBytes = packet.readBytes(extCount);
        for (let i = 0; i < extBytes.length; i++) for (let b = 7; b >= 0; b--) fullOriginalBits.push((extBytes[i] & (1 << b)) === 0);
    }
    headerEndOffset = packet.offset;

    const optMask = [...fullOriginalBits].reverse();
    let popCount = 0;
    const popBit = () => { popCount++; return optMask.pop(); };

    const skipObjectArray = (p, cb) => { const len = p.readStringLength(); for(let i=0; i<len; i++) cb(p); };
    const readV3 = () => [packet.readFloat32(false), packet.readFloat32(false), packet.readFloat32(false)];

    const result = { props: [], materials: {}, atlases: {} };

    if (popBit()) {
        const atlasLen = packet.readStringLength();
        for(let i=0; i<atlasLen; i++) {
            const aHeight = packet.readInt32(false); 
            const aName = packet.readString();
            packet.readUint32(false); 
            const rects = {};
            const rectLen = packet.readStringLength();
            for(let j=0; j<rectLen; j++) {
                const rHeight = packet.readUint32(false); 
                const rLib = packet.readString();
                const rName = packet.readString();
                const rWidth = packet.readUint32(false);
                const rx = packet.readUint32(false);
                const ry = packet.readUint32(false);
                rects[`${rLib}_${rName}`] = { x: rx, y: ry, w: rWidth, h: rHeight };
            }
            const aWidth = packet.readUint32(false);
            result.atlases[aName] = { width: aWidth, height: aHeight, rects };
        }
    }

    if (popBit()) skipObjectArray(packet, p => { p.readUint32(false); p.readString(); p.offset+=12; p.readString(); });

    const skipCols = () => {
        let len = packet.readStringLength(); for(let i=0; i<len; i++) packet.offset += 36; 
        len = packet.readStringLength(); for(let i=0; i<len; i++) { packet.readFloat64(false); packet.offset+=24; packet.readFloat64(false); } 
        len = packet.readStringLength(); for(let i=0; i<len; i++) { packet.readFloat64(false); packet.offset+=60; } 
    };
    skipCols(); skipCols();

    const matLen = packet.readStringLength();
    for(let i=0; i<matLen; i++) {
        const matID = packet.readUint32(false);
        const matName = packet.readString();
        if (popBit()) skipObjectArray(packet, p => { p.readString(); p.offset+=4; });
        const shader = packet.readString();

        const texParams = [];
        const texLen = packet.readStringLength();
        for(let j=0; j<texLen; j++) {
            let libName = null;
            if (popBit()) libName = packet.readString();
            const texParamName = packet.readString();
            const texName = packet.readString();
            texParams.push({ libName, name: texParamName, texName });
        }

        if (popBit()) skipObjectArray(packet, p => { p.readString(); p.offset+=8; });
        if (popBit()) skipObjectArray(packet, p => { p.readString(); p.offset+=12; });
        if (popBit()) skipObjectArray(packet, p => { p.readString(); p.offset+=16; });
        
        result.materials[matID] = { name: matName, shader, texParams };
    }

    if (popBit()) skipObjectArray(packet, p => { p.offset+=28; }); 

    const prefixOffset = packet.offset; 
    const popCountBeforeProps = popCount; 

    let maxPropId = 0;
    const propLen = packet.readStringLength();
    for(let i=0; i<propLen; i++) {
        let grpName = ""; if(popBit()) grpName = packet.readString();
        const id = packet.readUint32(false);
        if (id > maxPropId) maxPropId = id;

        const libName = packet.readString();
        const matID = packet.readUint32(false);
        const name = packet.readString();
        const pos = readV3();
        const rot = popBit() ? readV3() : [0,0,0];
        const scale = popBit() ? readV3() : [1,1,1];
        
        result.props.push({ id, grpName, libName, matID, name, pos, rot, scale });
    }

    const suffixBytes = packet.buffer.slice(packet.offset);
    const suffixBits = fullOriginalBits.slice(popCount);

    window.repackingData = {
        prefixBytes: packet.buffer.slice(headerEndOffset, prefixOffset),
        suffixBytes: suffixBytes,
        consumedBitsBeforeProps: fullOriginalBits.slice(0, popCountBeforeProps),
        suffixBits: suffixBits,
        maxPropId: maxPropId,
        originalProps: result.props 
    };

    return result;
}

function setupMobileFullscreen() {
    const lockScreen = async () => {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
        
        if (!isFullscreen) {
            try {
                const doc = document.documentElement;
                if (doc.requestFullscreen) {
                    await doc.requestFullscreen();
                } else if (doc.webkitRequestFullscreen) {
                    await doc.webkitRequestFullscreen();
                }
                
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock("landscape");
                }
            } catch (e) {
                console.warn("Fullscreen or orientation lock failed (possibly due to browser restrictions):", e.message);
            }
        }
    };

    document.body.addEventListener('click', lockScreen);
    document.body.addEventListener('touchstart', lockScreen, { passive: true });
}

function setupMobileControls() {
    const cameraPointers = {};
    let previousTwoFingerState = null;

    function getTwoFingerState(pointers) {
        if (pointers.length < 2) return null;
        const t0 = pointers[0];
        const t1 = pointers[1];
        return { 
            distance: Math.hypot(t1.x - t0.x, t1.y - t0.y), 
            midpoint: { x: (t0.x + t1.x) / 2, y: (t0.y + t1.y) / 2 } 
        };
    }

    function handleSpectatorPanAndZoom(pointers) {
        const currentState = getTwoFingerState(pointers);
        if (previousTwoFingerState && currentState) {
            const deltaPanX = currentState.midpoint.x - previousTwoFingerState.midpoint.x;
            const deltaPanY = currentState.midpoint.y - previousTwoFingerState.midpoint.y;
            const deltaPinch = currentState.distance - previousTwoFingerState.distance;

            camera.translateX(-deltaPanX);
            camera.translateY(deltaPanY);
            camera.translateZ(-deltaPinch);
        }
        previousTwoFingerState = currentState;
    }

    const onPointerDown = (e) => {
        cameraPointers[e.pointerId] = { x: e.clientX, y: e.clientY };
        window.cameraPointersCount = Object.keys(cameraPointers).length;
        if (Object.keys(cameraPointers).length >= 2) {
            previousTwoFingerState = getTwoFingerState(Object.values(cameraPointers));
            window.isEditingDrag = false;
            window.wasMultiTouch = true;
        }
    };

    const onPointerMove = (e) => {
        const pointer = cameraPointers[e.pointerId];
        if (!pointer) return;

        if (Object.keys(cameraPointers).length === 1 && window.dragMode !== 'none' && window.isEditingDrag) {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            return;
        }

        const deltaX = e.clientX - pointer.x;
        const deltaY = e.clientY - pointer.y;

        if (Object.keys(cameraPointers).length === 1) {
            camera.rotation.y -= deltaX * 0.004;
            camera.rotation.x -= deltaY * 0.004;
            camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
        } else if (Object.keys(cameraPointers).length === 2) {
            pointer.x = e.clientX;
            pointer.y = e.clientY;
            handleSpectatorPanAndZoom(Object.values(cameraPointers));
        }
        pointer.x = e.clientX;
        pointer.y = e.clientY;
    };

    const onPointerUpOrCancel = (e) => {
        delete cameraPointers[e.pointerId];
        window.cameraPointersCount = Object.keys(cameraPointers).length;
        if (Object.keys(cameraPointers).length < 2) {
            previousTwoFingerState = null;
        }
        if (Object.keys(cameraPointers).length === 0) {
            setTimeout(() => { window.wasMultiTouch = false; }, 50);
        }
    };

    const domElement = renderer.domElement;
    domElement.addEventListener('pointerdown', onPointerDown);
    domElement.addEventListener('pointermove', onPointerMove);
    domElement.addEventListener('pointerup', onPointerUpOrCancel);
    domElement.addEventListener('pointercancel', onPointerUpOrCancel);
    domElement.addEventListener('pointerleave', onPointerUpOrCancel);
}

function initThree() {
    if (renderer) return;

    scene = new THREE.Scene();
    const skyColor = new THREE.Color(0x9DD1F1); 
    scene.background = skyColor;
    
    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 20000);
    camera.position.set(0, 10, 80);
    camera.rotation.order = 'YXZ';
    camera.rotation.set(0.1, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", logarithmicDepthBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0; 
    
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    renderer.domElement.addEventListener('webglcontextlost', (event) => {
        event.preventDefault();
        console.warn("WebGL Context Lost! Pausing rendering...");
        if (loadingTextEl) loadingTextEl.innerText = "Restoring WebGL Context...";
        loadingScreen.style.display = 'flex';
        loadingScreen.style.opacity = '1';
    }, false);

    renderer.domElement.addEventListener('webglcontextrestored', () => {
        console.log("WebGL Context Restored! Re-initializing resources...");
      
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        pmremGenerator.compileEquirectangularShader();
        const environment = new RoomEnvironment();
        scene.environment = pmremGenerator.fromScene(environment).texture;
        environment.dispose();

        if (thumbScene && thumbRenderer) {
            const thumbPmrem = new THREE.PMREMGenerator(thumbRenderer);
            thumbPmrem.compileEquirectangularShader();
            const thumbEnv = new RoomEnvironment();
            thumbScene.environment = thumbPmrem.fromScene(thumbEnv).texture;
            thumbEnv.dispose();
        }

        textureCache.forEach(tex => {
            if(tex) tex.needsUpdate = true;
        });
        defaultControl.needsUpdate = true;
        defaultTile.needsUpdate = true;

        scene.traverse((child) => {
            if (child.isMesh && child.material) {
                child.material.needsUpdate = true;
            }
        });
        
        setTimeout(() => {
            window.dispatchEvent(new Event('resize'));
            hideLoading();
        }, 100);
    }, false);

    clock = new THREE.Clock();
    
    if (!isTouchDevice) {
        controls = new FlyControls(camera, renderer.domElement);
        controls.movementSpeed = 600;
        controls.rollSpeed = Math.PI / 6;
        controls.autoForward = false;
        controls.dragToLook = true;
    } else {
        setupMobileControls();
        setupMobileFullscreen();
    }

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();
    const environment = new RoomEnvironment();
    scene.environment = pmremGenerator.fromScene(environment).texture;
    environment.dispose();
    
    scene.environmentIntensity = 0.8; 

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    hemiLight.position.set(0, 1000, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0); 
    dirLight.position.set(-800, 1500, -500);
    dirLight.castShadow = true;
    
    dirLight.shadow.mapSize.width = 4096;
    dirLight.shadow.mapSize.height = 4096;
    
    const d = 500; 
    dirLight.shadow.camera.left = -d;
    dirLight.shadow.camera.right = d;
    dirLight.shadow.camera.top = d;
    dirLight.shadow.camera.bottom = -d;
    dirLight.shadow.camera.near = 100;
    dirLight.shadow.camera.far = 5000;
    
    dirLight.shadow.bias = -0.0005; 
    dirLight.shadow.normalBias = 0.05; 
    dirLight.shadow.blurSamples = 16; 
    dirLight.shadow.radius = 1.5; 
    
    scene.add(dirLight);

    const pixelRatio = window.devicePixelRatio;
    const renderTarget = new THREE.WebGLRenderTarget(
        window.innerWidth * pixelRatio, 
        window.innerHeight * pixelRatio, 
        {
            samples: 4,
            type: THREE.HalfFloatType
        }
    );
    
    composer = new EffectComposer(renderer, renderTarget);
    composer.setPixelRatio(window.devicePixelRatio);
    
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const ssaoPass = new SSAOPass(scene, camera, window.innerWidth, window.innerHeight);
    ssaoPass.kernelRadius = 8;      
    ssaoPass.minDistance = 0.002;    
    ssaoPass.maxDistance = 0.2;      
    ssaoPass.output = SSAOPass.OUTPUT.Default; 
    composer.addPass(ssaoPass);

    const outputPass = new OutputPass();
    composer.addPass(outputPass);

    function onWindowResize() {
        if(!camera || !renderer || !composer) return;
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
        composer.setSize(width, height); 
    }
    window.addEventListener('resize', onWindowResize);
   
    onWindowResize();

    initThumbnails();
    animate();
}

function initThumbnails() {
    thumbRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    thumbRenderer.setSize(512, 512);
    
    thumbRenderer.toneMapping = THREE.ACESFilmicToneMapping;
    thumbRenderer.toneMappingExposure = 1.0; 

    thumbScene = new THREE.Scene();
    thumbCamera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
    thumbCamera.position.set(0, 5, 12);
    thumbCamera.lookAt(0, 0, 0);
    
    const pmremGenerator = new THREE.PMREMGenerator(thumbRenderer);
    pmremGenerator.compileEquirectangularShader();
    const environment = new RoomEnvironment();
    thumbScene.environment = pmremGenerator.fromScene(environment).texture;
    environment.dispose();

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 8, 8); 
    thumbScene.add(dirLight);
}

function animate() {
    requestAnimationFrame(animate);
    
    const delta = Math.min(clock.getDelta(), 0.1); 
    
    if (controls) controls.update(delta);
    
    const uiContainer = document.getElementById('ui-container');
    if (uiContainer.style.transform !== 'translateX(100%)') {
        const listContainer = document.getElementById('prefab-list');
        const listRect = listContainer.getBoundingClientRect();
        
        for (const item of thumbnailItems) {
            item.model.rotation.y += delta * 1.5; 
            const rect = item.element.getBoundingClientRect();
            if (rect.bottom > listRect.top && rect.top < listRect.bottom && rect.width > 0) {
                thumbScene.add(item.model);
                thumbRenderer.render(thumbScene, thumbCamera);
                thumbScene.remove(item.model);
                item.ctx.clearRect(0, 0, item.canvas.width, item.canvas.height);
                item.ctx.drawImage(thumbRenderer.domElement, 0, 0, item.canvas.width, item.canvas.height);
            }
        }
    }
    
    if (composer && scene && camera) {
        composer.render();
    }
}

function setupEditorGroup() {
    if (!editorGroup) {
        const mapScale = 0.01; 
        editorGroup = new THREE.Group();
        editorGroup.rotation.x = -Math.PI / 2;
        editorGroup.scale.set(mapScale, mapScale, mapScale);
        scene.add(editorGroup);
    }
}

async function loadTexture(repo, branch, path, silent = false, isLinear = false) {
    const url = `https://raw.githubusercontent.com/${repo}/${branch}/${path}`;
    const loader = new THREE.TextureLoader();
    
    return new Promise((resolve) => {
        loader.load(url, (tex) => {
            tex.colorSpace = isLinear ? THREE.LinearSRGBColorSpace : THREE.SRGBColorSpace;
            tex.flipY = false;
            
            if (path.toLowerCase().includes('ground') || path.toLowerCase().includes('grass') || 
                path.toLowerCase().includes('soil') || path.toLowerCase().includes('conc')) {
                tex.wrapS = THREE.RepeatWrapping;
                tex.wrapT = THREE.RepeatWrapping;
            } else {
                tex.wrapS = THREE.ClampToEdgeWrapping;
                tex.wrapT = THREE.ClampToEdgeWrapping;
            }

            if (renderer) tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            resolve(tex);
        }, undefined, () => {
            if(!silent) console.warn(`Failed to load texture: ${url}`);
            resolve(null);
        });
    });
}

async function getPropDict() {
    if (!propDictCache) {
        log("Fetching Prop Library index...");
        const libJson = await fetchRawFile(REPO_PROPS, 'main', `${PROP_PATH}/library.json`, 'json');
        propDictCache = {};
        for(const grp of libJson.groups) {
            for(const p of grp.props) {
                if (p.mesh && p.mesh.file) {
                    propDictCache[`${grp.name}_${p.name}`] = p;
                    propDictCache[p.name] = p; 
                }
            }
        }
    }
    return propDictCache;
}

function addPrefabToUI(baseName, group) {
    const item = document.createElement('div');
    item.className = 'prefab-item';
    
    const canvas = document.createElement('canvas');
    canvas.width = 200;
    canvas.height = 200;
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.pointerEvents = 'none';
    
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    const label = document.createElement('span');
    label.innerText = baseName;
    label.title = baseName;
    
    item.appendChild(canvas);
    item.appendChild(label);
    document.getElementById('prefab-list').appendChild(item);
    
    const thumbModel = group.clone();
    
    thumbModel.updateMatrixWorld(true);
    const box = new THREE.Box3().setFromObject(thumbModel, true);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    
    thumbModel.position.sub(center);
    
    const rotationGroup = new THREE.Group();
    rotationGroup.rotation.x = -Math.PI / 2;
    rotationGroup.add(thumbModel);
    
    const container = new THREE.Group();
    container.add(rotationGroup);
    
    const scale = 8 / (maxDim || 0.1);
    container.scale.set(scale, scale, scale);
    
    thumbnailItems.push({ element: item, model: container, ctx, baseName, canvas });
    
    item.onclick = () => {
        document.querySelectorAll('.prefab-item').forEach(b => b.classList.remove('active'));
        item.classList.add('active');
        window.isGhostLockedToOriginal = false;
        window.selectPrefab(baseName);
        if (isTouchDevice) {
            isUIOpen = false;
            document.getElementById('ui-container').style.transform = 'translateX(100%)';
        }
    };
}

async function processMap(mapData, buildWorld = false) {
    const propDict = await getPropDict();

    const uniqueModelFiles = new Set();
    const uniqueTexNames = new Set();

    for (const prop of mapData.props) {
        const pInfo = propDict[`${prop.grpName}_${prop.name}`] || propDict[prop.name];
        if (pInfo) {
            if (pInfo.mesh && pInfo.mesh.file) uniqueModelFiles.add(pInfo.mesh.file);
            if (pInfo.textures) {
                for (let t of pInfo.textures) {
                    if (t.diffuseMap) uniqueTexNames.add(t.diffuseMap);
                }
            }
        }
    }

    for (const mat of Object.values(mapData.materials)) {
        for (const param of mat.texParams) {
            uniqueTexNames.add(param.texName);
        }
    }

    const extraGroundTextures = ['ground1', 'ground1_snow', 'Soil_Ground', 'grass1', 'grass1_snow', 'withered_grass', 'conc_tile', 'conc_tile2', 'conc_tile_snow'];
    for (const tex of extraGroundTextures) uniqueTexNames.add(tex);

    log(`Downloading models and textures...`);
    
    const modelPromises = Array.from(uniqueModelFiles).map(async (file) => {
        if (!modelCache.has(file)) {
            try {
                if (file.toLowerCase().endsWith('.a3d')) {
                    const a3dBuf = await fetchRawFile(REPO_PROPS, 'main', `${PROP_PATH}/${file}`);
                    const a3dData = parseA3D(a3dBuf);
                    if (a3dData.meshes.length > 0) modelCache.set(file, a3dData.meshes[0]);
                }
            } catch (e) { }
        }
    });

    const texPromises = Array.from(uniqueTexNames).map(async (texName) => {
        if (!textureCache.has(texName)) {
            const isControl = texName.includes('-control');
            let tex = await loadTexture(REPO_MAPS, 'master', `${MAP_PATH}/${texName}.webp`, true, isControl);
            if (!tex) tex = await loadTexture(REPO_PROPS, 'main', `html5/Remaster/${texName}.webp`, true, isControl);
            if (!tex && isControl) tex = await loadTexture(REPO_MAPS, 'master', `${MAP_PATH}/${texName}.png`, true, isControl);
            if (tex) textureCache.set(texName, tex);
        }
    });

    await Promise.all([...modelPromises, ...texPromises]);
    log(`Assets ready, processing map...`);

    if (buildWorld) {
        if (ghost) {
            editorGroup.remove(ghost);
            ghost = null;
            currentPrefabGroup = null;
            document.querySelector('.grid-floating-panel').style.display = 'none';
        }
        const toRemove = [];
        editorGroup.children.forEach(child => {
            toRemove.push(child);
        });
        toRemove.forEach(c => editorGroup.remove(c));
    }
    
    let originalMapGroup = null;
    let originalInstancesMap = new Map();
    
    if (buildWorld) {
        originalMapGroup = new THREE.Group();
        originalMapGroup.userData.isOriginalMapGroup = true;
        editorGroup.add(originalMapGroup);
    }

    const materialCache = new Map();

    for (let i = 0; i < mapData.props.length; i++) {
        const prop = mapData.props[i];
        
        let baseName = prop.name;
        if (/_sub\d+$/i.test(baseName)) {
            baseName = baseName.replace(/_sub\d+$/i, '');
        } else if (/_?part[12]$/i.test(baseName)) {
            baseName = baseName.replace(/_?part[12]$/i, '');
        }
        const lowerName = baseName.toLowerCase();
        if (lowerName === 'display' || lowerName === 'billboard') {
            baseName = 'billboard';
        } else if (['body', 'lb_track', 'lf_track', 'rb_track', 'rf_track'].includes(lowerName)) {
            baseName = 'Body';
        }

        const pInfo = propDict[`${prop.grpName}_${prop.name}`] || propDict[prop.name];
        const file = pInfo && pInfo.mesh ? pInfo.mesh.file : null;
        let geometry = file ? modelCache.get(file) : null;
        if (!geometry) continue;
        
        const matInfo = mapData.materials[prop.matID];
        const isSprite = matInfo && matInfo.shader.includes("Sprite");

        let controlTexName = null;
        let tileTexNames = [];

        if (pInfo && pInfo.textures && pInfo.textures.length > 0) {
            for (let t of pInfo.textures) {
                if (t.diffuseMap) {
                    if (t.diffuseMap.includes('-control')) controlTexName = t.diffuseMap;
                    else tileTexNames.push(t.diffuseMap);
                }
            }
        } 
        if (tileTexNames.length === 0 && matInfo && matInfo.texParams.length > 0) {
            for (let t of matInfo.texParams) {
                if (t.texName.includes('-control')) controlTexName = t.texName;
                else tileTexNames.push(t.texName);
            }
        }

        const instGeo = geometry.clone();
        let mat;
        const isTerrainMesh = file.toLowerCase().includes('terrain');
        const hasControlMap = !!controlTexName;

        const matCacheKey = `${isTerrainMesh}_${controlTexName}_${tileTexNames.join(',')}_${prop.matID}_${prop.libName}_${prop.name}`;

        if (materialCache.has(matCacheKey)) {
            mat = materialCache.get(matCacheKey);
        } else {
            if (isTerrainMesh || hasControlMap) {
                let texR = null, texG = null, texB = null;
                for (let t of tileTexNames) {
                    let lower = t.toLowerCase();
                    if (lower.includes('ground') || lower.includes('soil')) texR = textureCache.get(t);
                    else if (lower.includes('grass') || lower.includes('withered')) texG = textureCache.get(t);
                    else if (lower.includes('conc') || lower.includes('asph') || lower.includes('road')) texB = textureCache.get(t);
                }
                if (!texR && tileTexNames.length > 0) texR = textureCache.get(tileTexNames[0]);
                let tControl = textureCache.get(controlTexName);
                
                const maxAniso = renderer.capabilities.getMaxAnisotropy();
                if (texR && texR.anisotropy !== maxAniso) texR.anisotropy = maxAniso;
                if (texG && texG.anisotropy !== maxAniso) texG.anisotropy = maxAniso;
                if (texB && texB.anisotropy !== maxAniso) texB.anisotropy = maxAniso;

                mat = new THREE.MeshStandardMaterial({
                    roughness: 0.9,
                    metalness: 0.05,
                    side: THREE.DoubleSide
                });

                let customUniforms = {
                    tControl: { value: tControl || defaultControl },
                    tR: { value: texR || defaultTile }, 
                    tG: { value: texG || defaultTile }, 
                    tB: { value: texB || defaultTile }
                };

                mat.onBeforeCompile = (shader) => {
                    shader.uniforms.tControl = customUniforms.tControl;
                    shader.uniforms.tR = customUniforms.tR;
                    shader.uniforms.tG = customUniforms.tG;
                    shader.uniforms.tB = customUniforms.tB;

                    shader.vertexShader = `
                        varying vec2 vUvControl;
                        varying vec2 vUvTile;
                        ${shader.vertexShader}
                    `.replace(
                        `#include <uv_vertex>`,
                        `#include <uv_vertex>
                         vUvControl = uv;
                         vUvTile = position.xy / 500.0;
                        `
                    );

                    shader.fragmentShader = `
                        uniform sampler2D tControl;
                        uniform sampler2D tR;
                        uniform sampler2D tG;
                        uniform sampler2D tB;
                        varying vec2 vUvControl;
                        varying vec2 vUvTile;
                        ${shader.fragmentShader}
                    `.replace(
                        `#include <map_fragment>`,
                        `
                        vec4 control = texture2D(tControl, vUvControl);
                        if (control.a < 0.1) discard;

                        float w1 = control.r;
                        float w2 = control.g;
                        float w3 = control.b;
                        
                        vec4 splatColor = texture2D(tR, vUvTile) * w1 + 
                                          texture2D(tG, vUvTile) * w2 + 
                                          texture2D(tB, vUvTile) * w3;
                                          
                        float sum = w1 + w2 + w3;
                        vec4 baseColor = texture2D(tR, vUvTile);
                        if (sum > 0.001) {
                            splatColor = splatColor / sum; 
                            splatColor = mix(baseColor, splatColor, clamp(sum, 0.0, 1.0));
                        } else {
                            splatColor = baseColor;
                        }
                        
                        diffuseColor = vec4(splatColor.rgb, 1.0);
                        `
                    );
                };

            } else {
                mat = new THREE.MeshStandardMaterial({ 
                    color: 0xffffff, 
                    roughness: 0.85,
                    metalness: 0.02,
                    side: THREE.DoubleSide,
                    transparent: false,
                    alphaTest: 0.5,
                    depthWrite: true
                });

                let texName = tileTexNames.length > 0 ? tileTexNames[0] : null;
                if (texName) {
                    const diffTex = textureCache.get(texName);
                    if (diffTex) mat.map = diffTex;
                }
            }
            materialCache.set(matCacheKey, mat);
        }

        let texName = tileTexNames.length > 0 ? tileTexNames[0] : null;

        let atlasRect = null, atlasInfo = null;
        if (texName && mapData.atlases[texName]) {
            atlasInfo = mapData.atlases[texName];
            atlasRect = atlasInfo.rects[`${prop.libName}_${prop.name}`];
        }

        if (instGeo.attributes.uv && atlasRect && atlasInfo) {
            const uv = instGeo.attributes.uv.clone();
            let sx = atlasRect.w / atlasInfo.width;
            let sy = atlasRect.h / atlasInfo.height;
            let ox = atlasRect.x / atlasInfo.width;
            let oy = atlasRect.y / atlasInfo.height;
            
            for(let u=0; u<uv.array.length; u+=2) {
                uv.array[u] = uv.array[u] * sx + ox;
                uv.array[u+1] = uv.array[u+1] * sy + oy;
            }
            instGeo.setAttribute('uv', uv);
        }

        const prefabMesh = new THREE.Mesh(instGeo, mat);
        prefabMesh.castShadow = true;
        prefabMesh.receiveShadow = true;
        prefabMesh.scale.set(prop.scale[0], prop.scale[1], prop.scale[2]);

        if (buildWorld && originalMapGroup) {
            const posKey = `${prop.pos[0].toFixed(3)}_${prop.pos[1].toFixed(3)}_${prop.pos[2].toFixed(3)}`;
            const rotKey = `${prop.rot[0].toFixed(3)}_${prop.rot[1].toFixed(3)}_${prop.rot[2].toFixed(3)}`;
            const instanceKey = `${baseName}_${posKey}_${rotKey}`;
            
            if (!originalInstancesMap.has(instanceKey)) {
                const grp = new THREE.Group();
                grp.position.set(prop.pos[0], prop.pos[1], prop.pos[2]);
                grp.rotation.set(prop.rot[0], prop.rot[1], prop.rot[2]);
                grp.userData.baseName = baseName;
                grp.userData.originalProps = [];
                originalInstancesMap.set(instanceKey, grp);
            }
            
            const instanceGroup = originalInstancesMap.get(instanceKey);
            instanceGroup.userData.originalProps.push(prop);
            
            const sceneMesh = prefabMesh.clone();
            sceneMesh.position.set(0, 0, 0);
            sceneMesh.rotation.set(0, 0, 0);
            instanceGroup.add(sceneMesh);
        }

        if (!globalLoadedProps.has(prop.name)) {
            globalLoadedProps.add(prop.name);
            
            if (!prefabs.has(baseName)) {
                const group = new THREE.Group();
                group.userData.originalProps = [];
                prefabs.set(baseName, group);
            }
            prefabs.get(baseName).userData.originalProps.push(prop);
            prefabs.get(baseName).add(prefabMesh);
        }
    }
    
    if (buildWorld && originalMapGroup) {
        for (const grp of originalInstancesMap.values()) {
            originalMapGroup.add(grp);
        }
    }
    
    const sortedBaseNames = Array.from(prefabs.keys()).sort();
    sortedBaseNames.forEach(baseName => {
        if (!thumbnailItems.find(t => t.baseName === baseName)) {
            addPrefabToUI(baseName, prefabs.get(baseName));
        }
    });
}

async function loadMain() {
    try {
        initThree();
        setupEditorGroup();
        
        await showLoading("Fetching default map catalog...");
        const mapBuf = await fetchRawFile(REPO_MAPS, 'master', `${MAP_PATH}/map.bin`);
        const mapData = await parseMapBin(mapBuf);
        window.defaultMapProps = mapData.props;
        
        await processMap(mapData, false);
        setupUIEvents();
        
        log("Ready!");
        hideLoading();
    } catch (e) {
        log(`Fatal error: ${e.message}`);
        console.error(e);
        const spinner = document.querySelector('.m3-spinner');
        if (spinner) spinner.style.display = 'none';
        loadingTextEl.style.color = 'var(--md-sys-color-error)';
    }
}

document.addEventListener('visibilitychange', () => {
