        if (clock) clock.stop();
    } else {
        if (clock) clock.start();
        setTimeout(() => {
            window.dispatchEvent(new Event('resize'));
        }, 100);
    }
});

function setupUIEvents() {
    const uiContainer = document.getElementById('ui-container');
    const menuToggle = document.getElementById('menu-toggle');
    const rotateBtn = document.getElementById('rotate-btn');
    const exportBtn = document.getElementById('export-btn');
    const importBtn = document.getElementById('import-btn');
    const fileInput = document.getElementById('file-input');
    const clearBtn = document.getElementById('clear-btn');
    const gridHeightDisplay = document.getElementById('grid-height-display');
    const gridZBtn = document.getElementById('grid-z-btn');

    function updateDragModeUI() {
        rotateBtn.className = window.dragMode === 'rotate' ? 'm3-btn m3-btn-primary' : 'm3-btn m3-btn-secondary';
        gridZBtn.className = window.dragMode === 'gridZ' ? 'm3-btn m3-btn-primary' : 'm3-btn m3-btn-secondary';
        if (controls) {
            controls.dragToLook = window.dragMode === 'none';
        }
    }
    window.updateDragModeUI = updateDragModeUI;

    function setupBtnPress(btn, onClick, onLongPress) {
        let timer;
        let isLongPress = false;
        btn.addEventListener('pointerdown', (e) => {
            if (e.button !== 0 && e.pointerType === 'mouse') return;
            isLongPress = false;
            if (e.pointerId) btn.setPointerCapture(e.pointerId);
            timer = setTimeout(() => {
                isLongPress = true;
                onLongPress();
                if ('vibrate' in navigator) navigator.vibrate(50);
            }, 500);
        });
        btn.addEventListener('pointerup', (e) => {
            if (e.button !== 0 && e.pointerType === 'mouse') return;
            if (timer) clearTimeout(timer);
            if (!isLongPress) onClick();
            if (e.pointerId) btn.releasePointerCapture(e.pointerId);
        });
        btn.addEventListener('pointercancel', (e) => {
            if (timer) clearTimeout(timer);
            if (e.pointerId) btn.releasePointerCapture(e.pointerId);
        });
        // Prevent default click to avoid any double firing if browser synthesizes it
        btn.addEventListener('click', (e) => e.preventDefault());
    }

    setupBtnPress(rotateBtn, 
        () => {
            window.dragMode = window.dragMode === 'rotate' ? 'none' : 'rotate';
            updateDragModeUI();
        },
        () => {
            if (window.rotateButtonMode === 'horizontal') {
                window.rotateButtonMode = 'free';
                rotateBtn.querySelector('span').innerText = '3d_rotation';
                rotateBtn.title = "Toggle Free Rotate (Long press to switch)";
                showToast("Switched to Free Rotate Mode", false);
            } else {
                window.rotateButtonMode = 'horizontal';
                rotateBtn.querySelector('span').innerText = 'rotate_right';
                rotateBtn.title = "Toggle Horizontal Rotate (Long press to switch)";
                showToast("Switched to Horizontal Rotate Mode", false);
            }
        }
    );

    setupBtnPress(gridZBtn, 
        () => {
            window.dragMode = window.dragMode === 'gridZ' ? 'none' : 'gridZ';
            updateDragModeUI();
        },
        () => {
            currentGridHeight = 0;
            document.getElementById('grid-height-display').innerText = '0';
            if (ghost) updateGhost(currentMousePos.x, currentMousePos.y, true);
            showToast("Grid Z Reset", false);
        }
    );

    function updateGridHeight(delta) {
        currentGridHeight += delta;
        gridHeightDisplay.innerText = Math.round(currentGridHeight);
        if (ghost) {
            updateGhost(currentMousePos.x, currentMousePos.y, true);
        }
    }

    function updateUIState() {
        uiContainer.style.transform = isUIOpen ? 'translateX(0)' : 'translateX(100%)';
    }
    updateUIState();
    
    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        if(isTouchDevice && w < 768) {
            isUIOpen = false;
        } else if(!isTouchDevice && w >= 768) {
            isUIOpen = true;
        }
        updateUIState();
    });
    
    menuToggle.addEventListener('click', () => {
        isUIOpen = !isUIOpen;
        updateUIState();
    });

    const snapBtn = document.getElementById('snap-btn');
    snapBtn.addEventListener('click', () => {
        isSnapping = !isSnapping;
        snapBtn.className = isSnapping ? 'm3-btn m3-btn-primary' : 'm3-btn m3-btn-secondary';
    });

    importBtn.addEventListener('click', () => {
        fileInput.click();
        if(isTouchDevice) { isUIOpen = false; updateUIState(); }
    });
    
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        await showLoading("Loading custom map...");
        try {
            const buffer = await file.arrayBuffer();
            const mapData = await parseMapBin(buffer);
            await processMap(mapData, true);
        } catch (err) {
            log(`Import error: ${err.message}`);
            console.error(err);
            showToast("Failed to load map.");
        }
        hideLoading();
        e.target.value = ''; 
    });

    const dialogOverlay = document.getElementById('m3-dialog-overlay');
    const dialogContainer = document.getElementById('m3-dialog');
    const dialogCancelBtn = document.getElementById('dialog-cancel-btn');
    const dialogConfirmBtn = document.getElementById('dialog-confirm-btn');

    function closeDialog() {
        dialogOverlay.style.opacity = '0';
        dialogContainer.style.transform = 'scale(0.9) translateY(20px)';
        setTimeout(() => { dialogOverlay.style.display = 'none'; }, 300);
    }

    clearBtn.addEventListener('click', () => {
        dialogOverlay.style.display = 'flex';
        void dialogOverlay.offsetWidth;
        dialogOverlay.style.opacity = '1';
        dialogContainer.style.transform = 'scale(1) translateY(0)';
    });

    dialogCancelBtn.addEventListener('click', closeDialog);

    dialogConfirmBtn.addEventListener('click', () => {
        closeDialog();
        const toRemove = [];
        editorGroup.children.forEach(child => {
            toRemove.push(child);
        });
        toRemove.forEach(c => editorGroup.remove(c));
        
        if (ghost) {
            ghost = null;
            window.isGhostLockedToOriginal = false;
        }
        
        window.originalObjectBeingMoved = null;
        window.originalObjectParent = null;
        
        document.querySelector('.grid-floating-panel').style.display = 'none';
    });

    const continuousCopyBtn = document.getElementById('continuous-copy-btn');
    if (continuousCopyBtn) {
        continuousCopyBtn.addEventListener('click', () => {
            window.isContinuousCopyEnabled = !window.isContinuousCopyEnabled;
            continuousCopyBtn.className = window.isContinuousCopyEnabled ? 'm3-btn m3-btn-primary' : 'm3-btn m3-btn-secondary';
        });
    }

    const cancelGhostBtn = document.getElementById('cancel-ghost-btn');
    if (cancelGhostBtn) {
        cancelGhostBtn.addEventListener('click', () => {
            if (ghost) {
                editorGroup.remove(ghost);
                ghost = null;
                window.isGhostLockedToOriginal = false;
                document.querySelector('.grid-floating-panel').style.display = 'none';
                
                if (window.originalObjectBeingMoved) {
                    if (window.originalObjectParent) {
                        window.originalObjectParent.add(window.originalObjectBeingMoved);
                    } else {
                        editorGroup.add(window.originalObjectBeingMoved);
                    }
                    window.originalObjectBeingMoved = null;
                    window.originalObjectParent = null;
                }
            }
        });
    }

    exportBtn.addEventListener('click', async () => {
        try {
            const binData = await generateMapBin();
            const hashBuffer = await crypto.subtle.digest('SHA-256', binData);
            const hashHex = Array.from(new Uint8Array(hashBuffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('')
                .substring(0, 8);
                
            const blob = new Blob([binData], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `map.${hashHex}.bin`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("Export successful!", false);
        } catch (err) {
            console.error(err);
            showToast("Export failed: " + err.message);
        }
    });

    window.addEventListener('wheel', (e) => {
        if (e.target.closest('#ui-container')) return;
        if (ghost) {
            ghost.rotation.z += e.deltaY > 0 ? -Math.PI/8 : Math.PI/8;
            updateGhost(currentMousePos.x, currentMousePos.y); 
        }
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'q' || e.key === 'Q') updateGridHeight(-100);
        if (e.key === 'e' || e.key === 'E') updateGridHeight(100);
        if (e.key === 'r' || e.key === 'R') {
            if (ghost) {
                ghost.rotation.z -= Math.PI / 4; 
                updateGhost(currentMousePos.x, currentMousePos.y);
            }
        }
    });
    
    let longPressTimer = null;
    let selectedObjectForAction = null;

    function handleLongPress(clientX, clientY) {
        longPressTimer = null;
        if (ghost) return;

        mouse.x = (clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(editorGroup.children, true);
        let hitObj = null;

        for (let ix of intersects) {
            let obj = ix.object;
            while (obj && obj !== editorGroup) {
                if (obj === ghost || obj.userData.isOriginalMapGroup) {
                    break; 
                }
                if (obj.userData && (obj.userData.baseName || (obj.userData.originalProps && obj.userData.originalProps.length > 0))) {
                    hitObj = obj;
                    break;
                }
                obj = obj.parent;
            }
            if (hitObj) break;
        }

        if (hitObj) {
            if ('vibrate' in navigator) navigator.vibrate(50);
            
            selectedObjectForAction = hitObj;
            const cm = document.getElementById('context-menu');
            const title = document.getElementById('cm-title');
            
            let name = hitObj.userData.baseName;
            if (!name && hitObj.userData.originalProps && hitObj.userData.originalProps.length > 0) {
                let pName = hitObj.userData.originalProps[0].name;
                name = pName.replace(/_sub\d+$/i, '').replace(/_?part[12]$/i, '');
            }
            title.innerText = name || "Unknown Object";
            
            cm.style.display = 'flex';
            const cmWidth = cm.offsetWidth;
            const cmHeight = cm.offsetHeight;
            
            cm.style.left = Math.max(16, Math.min(clientX, window.innerWidth - cmWidth - 16)) + 'px';
            cm.style.top = Math.max(16, Math.min(clientY, window.innerHeight - cmHeight - 16)) + 'px';
        }
    }

    document.getElementById('cm-delete').onclick = () => {
        if (selectedObjectForAction) {
            if (selectedObjectForAction.parent) {
                selectedObjectForAction.parent.remove(selectedObjectForAction);
            } else {
                editorGroup.remove(selectedObjectForAction);
            }
        }
        document.getElementById('context-menu').style.display = 'none';
        selectedObjectForAction = null;
    };

    document.getElementById('cm-move').onclick = () => {
        if (selectedObjectForAction) {
            let name = selectedObjectForAction.userData.baseName;
            if (!name && selectedObjectForAction.userData.originalProps && selectedObjectForAction.userData.originalProps.length > 0) {
                let pName = selectedObjectForAction.userData.originalProps[0].name;
                name = pName.replace(/_sub\d+$/i, '').replace(/_?part[12]$/i, '');
            }
            const rot = selectedObjectForAction.rotation.clone();
            const pos = selectedObjectForAction.position.clone();
            
            window.originalObjectBeingMoved = selectedObjectForAction;
            window.originalObjectParent = selectedObjectForAction.parent;
            
            if (selectedObjectForAction.parent) {
                selectedObjectForAction.parent.remove(selectedObjectForAction);
            } else {
                editorGroup.remove(selectedObjectForAction);
            }
            
            if (name) {
                window.dragMode = 'none';
                updateDragModeUI();
                window.isGhostLockedToOriginal = true;
                window.selectPrefab(name);
                if (ghost) {
                    ghost.rotation.copy(rot);
                    ghost.position.copy(pos);
                    ghost.updateMatrixWorld(true);
                    
                    const box = new THREE.Box3().setFromObject(ghost, true);
                    const originalWorldY = editorGroup.localToWorld(pos.clone()).y;
                    let dip = 0;
                    if (box.min.y !== Infinity) {
                        dip = (originalWorldY - box.min.y) / editorGroup.scale.z;
                    }
                    
                    editorGroup.remove(ghost);
                    const originWorld = editorGroup.localToWorld(pos.clone());
                    const downRay = new THREE.Raycaster(originWorld, new THREE.Vector3(0, -1, 0));
                    const intersects = downRay.intersectObjects(editorGroup.children, true);
                    let hitZ = 0;
                    if (intersects.length > 0) {
                        const pt = editorGroup.worldToLocal(intersects[0].point);
                        hitZ = pt.z;
                    } else {
                        const zeroPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                        const ptWorld = new THREE.Vector3();
                        if (downRay.ray.intersectPlane(zeroPlane, ptWorld)) {
                            hitZ = editorGroup.worldToLocal(ptWorld).z;
                        }
                    }
                    editorGroup.add(ghost);
                    
                    let calculatedGridZ = (pos.z - dip) - hitZ;
                    if (isSnapping) {
                        calculatedGridZ = Math.round(calculatedGridZ / 100) * 100;
                    } else {
                        calculatedGridZ = Math.round(calculatedGridZ);
                    }
                    
                    currentGridHeight = calculatedGridZ;
                    const gridHeightDisplay = document.getElementById('grid-height-display');
                    if (gridHeightDisplay) gridHeightDisplay.innerText = currentGridHeight;
                    
                    ghost.userData.baseHitPoint = pos.clone();
                    ghost.userData.baseHitPoint.z = hitZ;
                    updateGhost(currentMousePos.x, currentMousePos.y, true);
                }
            }
        }
        document.getElementById('context-menu').style.display = 'none';
        selectedObjectForAction = null;
    };

    document.getElementById('cm-copy').onclick = () => {
        if (selectedObjectForAction) {
            let name = selectedObjectForAction.userData.baseName;
            if (!name && selectedObjectForAction.userData.originalProps && selectedObjectForAction.userData.originalProps.length > 0) {
                let pName = selectedObjectForAction.userData.originalProps[0].name;
                name = pName.replace(/_sub\d+$/i, '').replace(/_?part[12]$/i, '');
            }
            const rot = selectedObjectForAction.rotation.clone();
            const pos = selectedObjectForAction.position.clone();
            
            window.originalObjectBeingMoved = null;
            window.originalObjectParent = null;
            
            if (name) {
                window.dragMode = 'none';
                updateDragModeUI();
                window.isGhostLockedToOriginal = true;
                window.selectPrefab(name);
                
                window.isContinuousCopyEnabled = true;
                const copyBtn = document.getElementById('continuous-copy-btn');
                if (copyBtn) copyBtn.className = 'm3-btn m3-btn-primary';
                if (ghost) {
                    ghost.rotation.copy(rot);
                    ghost.position.copy(pos);
                    ghost.updateMatrixWorld(true);
                    
                    const box = new THREE.Box3().setFromObject(ghost, true);
                    const originalWorldY = editorGroup.localToWorld(pos.clone()).y;
                    let dip = 0;
                    if (box.min.y !== Infinity) {
                        dip = (originalWorldY - box.min.y) / editorGroup.scale.z;
                    }
                    
                    editorGroup.remove(ghost);
                    const originWorld = editorGroup.localToWorld(pos.clone());
                    const downRay = new THREE.Raycaster(originWorld, new THREE.Vector3(0, -1, 0));
                    const intersects = downRay.intersectObjects(editorGroup.children, true);
                    let hitZ = 0;
                    if (intersects.length > 0) {
                        const pt = editorGroup.worldToLocal(intersects[0].point);
                        hitZ = pt.z;
                    } else {
                        const zeroPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
                        const ptWorld = new THREE.Vector3();
                        if (downRay.ray.intersectPlane(zeroPlane, ptWorld)) {
                            hitZ = editorGroup.worldToLocal(ptWorld).z;
                        }
                    }
                    editorGroup.add(ghost);
                    
                    let calculatedGridZ = (pos.z - dip) - hitZ;
                    if (isSnapping) {
                        calculatedGridZ = Math.round(calculatedGridZ / 100) * 100;
                    } else {
                        calculatedGridZ = Math.round(calculatedGridZ);
                    }
                    
                    currentGridHeight = calculatedGridZ;
                    const gridHeightDisplay = document.getElementById('grid-height-display');
                    if (gridHeightDisplay) gridHeightDisplay.innerText = currentGridHeight;
                    
                    ghost.userData.baseHitPoint = pos.clone();
                    ghost.userData.baseHitPoint.z = hitZ;
                    updateGhost(currentMousePos.x, currentMousePos.y, true);
                }
            }
        }
        document.getElementById('context-menu').style.display = 'none';
        selectedObjectForAction = null;
    };

    renderer.domElement.addEventListener('pointerdown', (e) => {
        if (!e.isPrimary) return;
        isDragging = false;
        pointerDownPos = {x: e.clientX, y: e.clientY};
        
        if (e.button === 2) {
            document.getElementById('context-menu').style.display = 'none';
            if (ghost) {
                editorGroup.remove(ghost);
                ghost = null;
                window.isGhostLockedToOriginal = false;
                document.querySelector('.grid-floating-panel').style.display = 'none';
                
                if (window.originalObjectBeingMoved) {
                    if (window.originalObjectParent) {
                        window.originalObjectParent.add(window.originalObjectBeingMoved);
                    } else {
                        editorGroup.add(window.originalObjectBeingMoved);
                    }
                    window.originalObjectBeingMoved = null;
                    window.originalObjectParent = null;
                }
            }
            return;
        }

        if (e.target.closest('#context-menu') || document.getElementById('context-menu').style.display === 'flex') {
            document.getElementById('context-menu').style.display = 'none';
        }
        
        if (window.dragMode !== 'none' && ghost && (window.cameraPointersCount || 0) < 2) {
            window.isEditingDrag = true;
            editDragStart = {x: e.clientX, y: e.clientY};
            initialGhostRot.copy(ghost.rotation);
            initialGridZ = currentGridHeight;
            window.hasSlidGridZ = false;
            return; 
        }

        if (window.isGhostLockedToOriginal) {
            window.isGhostLockedToOriginal = false;
        }

        longPressTimer = setTimeout(() => handleLongPress(e.clientX, e.clientY), 500);
        updateGhost(e.clientX, e.clientY);
    });

    renderer.domElement.addEventListener('pointermove', (e) => {
        if (e.isPrimary) {
            if (Math.abs(e.clientX - pointerDownPos.x) > 15 || Math.abs(e.clientY - pointerDownPos.y) > 15) {
                isDragging = true;
                if (longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                }
                if (window.isGhostLockedToOriginal && window.dragMode === 'none') {
                    window.isGhostLockedToOriginal = false;
                }
            }
        }
        
        if (window.isEditingDrag && window.dragMode !== 'none' && ghost) {
            const deltaX = e.clientX - editDragStart.x;
            const deltaY = e.clientY - editDragStart.y;

            if (window.dragMode === 'rotate') {
                let rotZ = deltaX * 0.02;
                let rotX = deltaY * 0.02;

                const snap = Math.PI / 4;


                // Get camera axes in world space
                const camRightWorld = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                const camUpWorld = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);

                // Convert to editorGroup local space using proper vector transformation
                const groupInv = editorGroup.matrixWorld.clone().invert();
                const camRightLocal = camRightWorld.clone().transformDirection(groupInv).normalize();
                const camUpLocal = camUpWorld.clone().transformDirection(groupInv).normalize();

                if (window.rotateButtonMode === 'free') {
                    const qInitial = new THREE.Quaternion().setFromEuler(initialGhostRot);
                    
                    const qUp = new THREE.Quaternion().setFromAxisAngle(camUpLocal, rotZ); 
                    const qRight = new THREE.Quaternion().setFromAxisAngle(camRightLocal, rotX);
                    const finalQ = new THREE.Quaternion().copy(qUp).multiply(qRight).multiply(qInitial);
                    
                    if (isSnapping) {
                 
                        const euler = new THREE.Euler().setFromQuaternion(finalQ, ghost.rotation.order);
                        euler.x = Math.round(euler.x / snap) * snap;
                        euler.y = Math.round(euler.y / snap) * snap;
                        euler.z = Math.round(euler.z / snap) * snap;
                        ghost.rotation.copy(euler);
                    } else {
             
                        ghost.quaternion.copy(finalQ);
                    }
                } else {
                    if (isSnapping) {
                        rotZ = Math.round(rotZ / snap) * snap;
                    }
                    
                    const isCameraInverted = camUpLocal.z < 0; 
                    let finalRotZ = rotZ;
                    if (isCameraInverted) {
                        finalRotZ = -rotZ;
                    }
                    
                    ghost.rotation.set(
                        initialGhostRot.x,
                        initialGhostRot.y,
                        initialGhostRot.z + finalRotZ
                    );
                }
            } else if (window.dragMode === 'gridZ') {
                let deltaZ = -deltaY * 2;
                let newZ = initialGridZ + deltaZ;
                
                if (Math.abs(deltaY) > 5) window.hasSlidGridZ = true;

                if (isSnapping && window.hasSlidGridZ) {
                    newZ = Math.round(newZ / 100) * 100;
                } else if (isSnapping && !window.hasSlidGridZ) {
                    newZ = initialGridZ; 
                }

                currentGridHeight = newZ;
                document.getElementById('grid-height-display').innerText = Math.round(currentGridHeight);
            }

            updateGhost(editDragStart.x, editDragStart.y, true);
            return;
        }

        if ((window.cameraPointersCount || 0) >= 2) return; // Do not move ghost X/Y if panning camera

        updateGhost(e.clientX, e.clientY);
    });

    renderer.domElement.addEventListener('pointerup', (e) => {
        if (!e.isPrimary) return;
        if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
        }
        
        if (window.isEditingDrag) {
            window.isEditingDrag = false;
            if (Math.abs(e.clientX - pointerDownPos.x) > 10 || Math.abs(e.clientY - pointerDownPos.y) > 10) {
                return;
            }
        }
        
        if (window.wasMultiTouch) {
            return;
        }
        
        if (!isDragging && ghost && (e.button === 0 || e.pointerType === 'touch')) {
            updateGhost(e.clientX, e.clientY, window.dragMode !== 'none' || window.isGhostLockedToOriginal);
            const instance = currentPrefabGroup.clone();
            instance.position.copy(ghost.position);
            instance.rotation.copy(ghost.rotation);
            
            instance.updateMatrixWorld(true);
            instance.userData.worldBox = new THREE.Box3().setFromObject(instance, true);
            instance.userData.baseName = window.currentBaseName;
            
            editorGroup.add(instance);
            
            window.originalObjectBeingMoved = null;
            window.originalObjectParent = null;

            if (!window.isContinuousCopyEnabled) {
                editorGroup.remove(ghost);
                ghost = null;
                window.isGhostLockedToOriginal = false;
                document.querySelector('.grid-floating-panel').style.display = 'none';
            } else {
                window.isGhostLockedToOriginal = false;
                window.dragMode = 'none';
                if (window.updateDragModeUI) window.updateDragModeUI();
                updateGhost(e.clientX, e.clientY, false);
            }
        }
    });
}

async function generateMapBin() {
    if (!window.repackingData) throw new Error("Repacking data not initialized");
    
    const newPropBits = [];
    const bw = new BinaryWriter();
    const propsToWrite = [];
    
    let originalMapGrp = editorGroup.children.find(c => c.userData.isOriginalMapGroup);
    if (originalMapGrp) {
        for (const child of originalMapGrp.children) {
            if (child.userData.originalProps && child.userData.originalProps.length > 0) {
                for (const origProp of child.userData.originalProps) {
                    propsToWrite.push({
                        ...origProp,
                        pos: [child.position.x, child.position.y, child.position.z],
                        rot: [child.rotation.x, child.rotation.y, child.rotation.z]
                    });
                }
            }
        }
    }

    let idCounter = window.repackingData.maxPropId + 1;
    let instanceIndex = 1;

    for (const child of editorGroup.children) {
        if (child === ghost || child.userData.isOriginalMapGroup) continue;  
        
        if (child.userData.originalProps) {
            for (const origProp of child.userData.originalProps) {
                let outGrpName = origProp.grpName;
                if (outGrpName && outGrpName !== "") {
                    outGrpName = outGrpName + "_inst" + instanceIndex;
                }
                propsToWrite.push({
                    ...origProp,
                    grpName: outGrpName,
                    id: idCounter++,
                    pos: [child.position.x, child.position.y, child.position.z],
                    rot: [child.rotation.x, child.rotation.y, child.rotation.z],
                    scale: origProp.scale 
                });
            }
            instanceIndex++;
        }
    }
    
    bw.writeStringLength(propsToWrite.length);
    for (const p of propsToWrite) {
        if (p.grpName && p.grpName !== "") {
            newPropBits.push(true);
            bw.writeString(p.grpName);
        } else {
            newPropBits.push(false);
        }
        
        bw.writeUint32(p.id, false);
        bw.writeString(p.libName);
        bw.writeUint32(p.matID, false);
        bw.writeString(p.name);
        
        bw.writeFloat32(p.pos[0], false);
        bw.writeFloat32(p.pos[1], false);
        bw.writeFloat32(p.pos[2], false);
        
        const isRotZero = (Math.abs(p.rot[0]) < 1e-5 && Math.abs(p.rot[1]) < 1e-5 && Math.abs(p.rot[2]) < 1e-5);
        if (!isRotZero) {
            newPropBits.push(true);
            bw.writeFloat32(p.rot[0], false);
            bw.writeFloat32(p.rot[1], false);
            bw.writeFloat32(p.rot[2], false);
        } else {
            newPropBits.push(false);
        }
        
        const isScaleOne = (Math.abs(p.scale[0]-1) < 1e-5 && Math.abs(p.scale[1]-1) < 1e-5 && Math.abs(p.scale[2]-1) < 1e-5);
        if (!isScaleOne) {
            newPropBits.push(true);
            bw.writeFloat32(p.scale[0], false);
            bw.writeFloat32(p.scale[1], false);
            bw.writeFloat32(p.scale[2], false);
        } else {
            newPropBits.push(false);
        }
    }
    
    const finalBits = [
        ...window.repackingData.consumedBitsBeforeProps, 
        ...newPropBits,
        ...window.repackingData.suffixBits
    ];
    const header = packHeader(finalBits);
    
    const uncompressedLen = header.headerPrefix.length + 
                            header.extBytes.length + 
                            window.repackingData.prefixBytes.length + 
                            bw.length + 
                            window.repackingData.suffixBytes.length; 
    
    const uncompressed = new Uint8Array(uncompressedLen);
    let offset = 0;
    
    uncompressed.set(header.headerPrefix, offset); offset += header.headerPrefix.length;
    uncompressed.set(header.extBytes, offset); offset += header.extBytes.length;
    uncompressed.set(window.repackingData.prefixBytes, offset); offset += window.repackingData.prefixBytes.length;
    uncompressed.set(bw.toUint8Array(), offset); offset += bw.length; 
    uncompressed.set(window.repackingData.suffixBytes, offset); 
    
    return await wrapPacketCompressed(uncompressed);
}

window.selectPrefab = function(baseName) {
    if (ghost) {
        editorGroup.remove(ghost);
        ghost = null;
        if (window.originalObjectBeingMoved) {
            if (window.originalObjectParent) {
                window.originalObjectParent.add(window.originalObjectBeingMoved);
            } else {
                editorGroup.add(window.originalObjectBeingMoved);
            }
            window.originalObjectBeingMoved = null;
            window.originalObjectParent = null;
        }
    }
    
    window.isContinuousCopyEnabled = false;
    const copyBtn = document.getElementById('continuous-copy-btn');
    if (copyBtn) copyBtn.className = 'm3-btn m3-btn-secondary';
    
    window.dragMode = 'none';
    if (window.updateDragModeUI) window.updateDragModeUI();

    currentPrefabGroup = prefabs.get(baseName);
    window.currentBaseName = baseName;
    if (currentPrefabGroup) {
        ghost = currentPrefabGroup.clone();
        ghost.rotation.order = 'ZXY';
        ghost.traverse(child => {
            if (child.isMesh) {
                child.material = child.material.clone();
                child.material.transparent = true;
                child.material.opacity = 0.7;
                child.material.depthWrite = false;
                child.userData.origColor = child.material.color ? child.material.color.getHex() : 0xffffff;
            }
        });
        editorGroup.add(ghost);
        if (!window.isGhostLockedToOriginal) {
            updateGhost(currentMousePos.x, currentMousePos.y);
        }
        document.querySelector('.grid-floating-panel').style.display = 'flex';
    }
};

function updateGhost(clientX, clientY, isLockedDrag = false) {
    currentMousePos.x = clientX;
    currentMousePos.y = clientY;
    if (!ghost) return;

    if (!isLockedDrag && !window.isGhostLockedToOriginal) {
        mouse.x = (clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const intersects = raycaster.intersectObjects(editorGroup.children, true);
        let hitPoint = null;

        let objHitPoint = null;
        const validIntersects = intersects.filter(ix => {
            let obj = ix.object;
            while(obj) {
                if (obj === ghost) return false;
                obj = obj.parent;
            }
            return true;
        });
        if (validIntersects.length > 0) {
            objHitPoint = validIntersects[0].point;
        }

        groundPlane.set(new THREE.Vector3(0, 1, 0), 0);
        let zeroPlaneHitPoint = null;
        const zeroIntersect = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(groundPlane, zeroIntersect)) {
            zeroPlaneHitPoint = zeroIntersect;
        }

        if (camera.position.y >= 0) {
            if (objHitPoint && zeroPlaneHitPoint) {
                if (camera.position.distanceTo(objHitPoint) < camera.position.distanceTo(zeroPlaneHitPoint)) {
                    hitPoint = objHitPoint;
                } else {
                    hitPoint = zeroPlaneHitPoint;
                }
            } else if (objHitPoint) {
                hitPoint = objHitPoint;
            } else if (zeroPlaneHitPoint) {
                hitPoint = zeroPlaneHitPoint;
            }
        } else {
            if (objHitPoint) {
                hitPoint = objHitPoint;
            } else if (zeroPlaneHitPoint) {
                hitPoint = zeroPlaneHitPoint;
            }
        }

        if (!hitPoint) {
            hitPoint = raycaster.ray.at(1000, new THREE.Vector3());
            if (camera.position.y >= 0) hitPoint.y = 0;
        }

        if (hitPoint) {
            editorGroup.worldToLocal(hitPoint);
            
            if (isSnapping && currentPrefabGroup) {
                let snapped = false;
                let snapX = 250;
                let snapY = 250;
                let snapZ = 100;

                for (let i = 0; i < editorGroup.children.length; i++) {
                    const child = editorGroup.children[i];
                    if (child === ghost || child.userData.isOriginalMapGroup) continue;
                    
                    const dist = child.position.distanceTo(hitPoint);
                    if (dist < 800.0) {
                        const diff = hitPoint.clone().sub(child.position);
                        hitPoint.x = child.position.x + Math.round(diff.x / snapX) * snapX;
                        hitPoint.y = child.position.y + Math.round(diff.y / snapY) * snapY;
                        hitPoint.z = child.position.z + Math.round(diff.z / snapZ) * snapZ;
                        snapped = true;
                        break;
                    }
                }
                if (!snapped) {
                    hitPoint.x = Math.round(hitPoint.x / snapX) * snapX;
                    hitPoint.y = Math.round(hitPoint.y / snapY) * snapY;
                    hitPoint.z = Math.round(hitPoint.z / snapZ) * snapZ;
                }
            }
            ghost.userData.baseHitPoint = hitPoint.clone();
        }
    }

    if (ghost.userData.baseHitPoint) {
        const hp = ghost.userData.baseHitPoint.clone();
        hp.z += currentGridHeight;
        ghost.position.copy(hp);
        
        ghost.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(ghost, true);
        const originalWorldY = editorGroup.localToWorld(hp.clone()).y;
        
        if (box.min.y !== Infinity) {
            const dip = originalWorldY - box.min.y;
            if (Math.abs(dip) > 0.001) {
                ghost.position.z += dip / editorGroup.scale.z;
            }
        }
    }
}
