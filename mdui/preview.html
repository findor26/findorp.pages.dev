<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDUI 2 示例</title>
  
  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
  
  <script type="module" src="https://unpkg.com/mdui@2/mdui.global.js"></script>
</head>
<body>

  <mdui-top-app-bar>
    <mdui-button-icon icon="menu"></mdui-button-icon>
    <mdui-top-app-bar-title>我的应用</mdui-top-app-bar-title>
    <div style="flex-grow: 1"></div>
    <mdui-button-icon icon="search"></mdui-button-icon>
  </mdui-top-app-bar>

  <div style="padding: 16px;">
    <mdui-button variant="filled">点击按钮</mdui-button>
    <mdui-checkbox>勾选框</mdui-checkbox>
  </div>

</body>
</html>
