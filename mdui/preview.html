<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDUI 2 完整演示</title>

    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    
    <script type="module" src="https://unpkg.com/mdui@2/mdui.global.js"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        /* 页面布局调整 */
        body {
            background-color: var(--mdui-color-background);
            color: var(--mdui-color-on-background);
            margin: 0;
            padding-top: 64px; /* 为顶栏留出空间 */
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }
        .section-card {
            margin-bottom: 24px;
            padding: 20px;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
    </style>
</head>
<body class="mdui-theme-light"> <mdui-top-app-bar scroll-behavior="hide">
        <mdui-button-icon icon="menu" id="open-drawer"></mdui-button-icon>
        <mdui-top-app-bar-title>MDUI 2 控制台</mdui-top-app-bar-title>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon icon="light_mode" id="theme-toggle"></mdui-button-icon>
        <mdui-button-icon icon="account_circle"></mdui-button-icon>
    </mdui-top-app-bar>

    <mdui-navigation-drawer id="main-drawer" close-on-overlay-click>
        <mdui-list>
            <mdui-list-item icon="home" selected>首页</mdui-list-item>
            <mdui-list-item icon="settings">系统设置</mdui-list-item>
            <mdui-list-item icon="info">关于我们</mdui-list-item>
        </mdui-list>
    </mdui-navigation-drawer>

    <div class="container">
        
        <mdui-card class="section-card" variant="filled">
            <mdui-typography variant="headline-small">交互组件</mdui-typography>
            <mdui-typography variant="body-medium" style="margin-bottom: 16px; display: block;">
                MDUI 2 提供了多种 Material 3 风格的按钮：
            </mdui-typography>
            
            <div class="button-group">
                <mdui-button variant="filled">填充按钮</mdui-button>
                <mdui-button variant="tonal">色调按钮</mdui-button>
                <mdui-button variant="outlined">描边按钮</mdui-button>
                <mdui-button variant="text">文本按钮</mdui-button>
                <mdui-button icon="download" loading>正在加载</mdui-button>
            </div>
        </mdui-card>

        <mdui-card class="section-card" variant="outlined">
            <mdui-typography variant="headline-small">数据输入</mdui-typography>
            <div style="margin-top: 16px;">
                <mdui-text-field label="用户名" icon="person" clearable></mdui-text-field>
                <mdui-text-field label="密码" type="password" toggle-password icon="lock" style="margin-top: 16px;"></mdui-text-field>
                
                <div style="margin-top: 20px; display: flex; align-items: center; gap: 24px;">
                    <mdui-checkbox>自动登录</mdui-checkbox>
                    <mdui-switch icon-on="check" icon-off="close"></mdui-switch>
                </div>
            </div>
        </mdui-card>

        <mdui-fab icon="add" extended style="position: fixed; bottom: 24px; right: 24px;">
            新建任务
        </mdui-fab>

    </div>

    <mdui-dialog id="example-dialog">
        <span slot="headline">确认操作</span>
        <span slot="description">此操作将应用当前的系统设置，是否继续？</span>
        <mdui-button slot="action" variant="text" id="close-dialog">取消</mdui-button>
        <mdui-button slot="action" variant="filled">确定</mdui-button>
    </mdui-dialog>

    <script>
        // 侧边栏控制
        const drawer = document.querySelector('#main-drawer');
        const openBtn = document.querySelector('#open-drawer');
        openBtn.addEventListener('click', () => {
            drawer.open = !drawer.open;
        });

        // 主题切换逻辑
        const themeBtn = document.querySelector('#theme-toggle');
        const body = document.body;
        themeBtn.addEventListener('click', () => {
            if (body.classList.contains('mdui-theme-light')) {
                body.classList.replace('mdui-theme-light', 'mdui-theme-dark');
                themeBtn.icon = 'dark_mode';
            } else {
                body.classList.replace('mdui-theme-dark', 'mdui-theme-light');
                themeBtn.icon = 'light_mode';
            }
        });

        // 按钮点击触发对话框
        const dialog = document.querySelector('#example-dialog');
        const submitBtn = document.querySelector('mdui-button[variant="filled"]');
        submitBtn.addEventListener('click', () => {
            dialog.open = true;
        });

        const closeDialogBtn = document.querySelector('#close-dialog');
        closeDialogBtn.addEventListener('click', () => {
            dialog.open = false;
        });
    </script>

</body>
</html>
