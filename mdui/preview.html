<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDUI 2 综合组件演示</title>

    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <script type="module" src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            /* 页面背景色使用 Material Design 变量 */
            background-color: var(--mdui-color-surface-container-low);
            color: var(--mdui-color-on-surface);
            font-family: Roboto, system-ui, sans-serif;
        }
        body { margin: 0; padding-bottom: 80px; }
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .component-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }
        .card-header { margin-bottom: 16px; display: block; }
        .flex-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    </style>
</head>
<body class="mdui-theme-light">

    <mdui-top-app-bar variant="center-aligned">
        <mdui-button-icon icon="arrow_back"></mdui-button-icon>
        <mdui-top-app-bar-title>组件实验室</mdui-top-app-bar-title>
        <div style="flex-grow: 1"></div>
        <mdui-button-icon icon="palette" id="theme-toggle"></mdui-button-icon>
    </mdui-top-app-bar>

    <div class="main-content">
        
        <mdui-card variant="elevated" style="padding: 16px;">
            <mdui-typography variant="title-medium" class="card-header">导航与切换</mdui-typography>
            
            <mdui-tabs value="tab-1" style="margin-bottom: 16px;">
                <mdui-tab value="tab-1" icon="dashboard">仪表盘</mdui-tab>
                <mdui-tab value="tab-2" icon="history">历史记录</mdui-tab>
                <mdui-tab value="tab-3" icon="settings">设置</mdui-tab>
            </mdui-tabs>

            <mdui-segmented-button-group select-strategy="single" value="day">
                <mdui-segmented-button value="day">日视图</mdui-segmented-button>
                <mdui-segmented-button value="week">周视图</mdui-segmented-button>
                <mdui-segmented-button value="month">月视图</mdui-segmented-button>
            </mdui-segmented-button-group>
        </mdui-card>

        <div class="component-grid">
            <mdui-card variant="outlined" style="padding: 16px;">
                <mdui-typography variant="title-medium" class="card-header">精细调节</mdui-typography>
                
                <mdui-select label="服务器区域" value="cn-shanghai" style="width: 100%; margin-bottom: 20px;">
                    <mdui-menu-item value="cn-shanghai">华东 (上海)</mdui-menu-item>
                    <mdui-menu-item value="cn-beijing">华北 (北京)</mdui-beijing>
                    <mdui-menu-item value="hk">中国香港</mdui-menu-item>
                </mdui-select>

                <mdui-typography variant="label-large">亮度调节</mdui-typography>
                <mdui-slider value="75" icon="brightness_6"></mdui-slider>
                
                <mdui-typography variant="label-large" style="margin-top: 10px;">音量</mdui-typography>
                <mdui-slider range value="[20, 80]"></mdui-slider>
            </mdui-card>

            <mdui-card variant="outlined" style="padding: 16px;">
                <mdui-typography variant="title-medium" class="card-header">反馈状态</mdui-typography>
                
                <div style="margin-bottom: 24px;">
                    <mdui-typography variant="body-small">线性进度条</mdui-typography>
                    <mdui-linear-progress value="0.6"></mdui-linear-progress>
                </div>

                <div class="flex-row">
                    <mdui-circular-progress></mdui-circular-progress>
                    <mdui-circular-progress value="0.75"></mdui-circular-progress>
                    <mdui-badge content="99+">
                        <mdui-button variant="tonal">通知</mdui-button>
                    </mdui-badge>
                </div>

                <div style="margin-top: 20px;">
                    <mdui-chip icon="check" closable>已连接</mdui-chip>
                    <mdui-chip icon="error" variant="filled">异常</mdui-chip>
                </div>
            </mdui-card>
        </div>

        <mdui-card variant="filled" style="padding: 8px;">
            <mdui-list>
                <mdui-list-item icon="folder" end-icon="more_vert">
                    我的项目
                    <span slot="description">最后修改于 2 小时前</span>
                </mdui-list-item>
                <mdui-divider></mdui-divider>
                <mdui-list-item icon="image" end-icon="delete">
                    截图_2024.png
                    <span slot="description">1.2 MB</span>
                </mdui-list-item>
                <mdui-list-item icon="description" end-icon="share">
                    开发文档.pdf
                    <span slot="description">昨天 18:30</span>
                </mdui-list-item>
            </mdui-list>
        </mdui-card>

    </div>

    <mdui-navigation-bar value="home">
        <mdui-navigation-bar-item value="home" icon="home">首页</mdui-navigation-bar-item>
        <mdui-navigation-bar-item value="search" icon="search">搜索</mdui-navigation-bar-item>
        <mdui-navigation-bar-item value="profile" icon="person">我的</mdui-navigation-bar-item>
    </mdui-navigation-bar>

    <script>
        // 主题切换
        const themeBtn = document.querySelector('#theme-toggle');
        themeBtn.addEventListener('click', () => {
            const isDark = document.body.classList.contains('mdui-theme-dark');
            document.body.classList.toggle('mdui-theme-dark', !isDark);
            document.body.classList.toggle('mdui-theme-light', isDark);
            themeBtn.icon = isDark ? 'palette' : 'dark_mode';
        });

        // 监听滑块值变化
        const slider = document.querySelector('mdui-slider');
        slider.addEventListener('change', (e) => {
            console.log('当前亮度:', e.target.value);
        });
    </script>
</body>
</html>
