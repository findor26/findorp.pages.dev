<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试服务器 - MD3 版</title>
    <link rel="icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* MD3 Dark Theme Tonal Palettes */
            --md-sys-color-primary: #D0E4FF;
            --md-sys-color-on-primary: #003258;
            --md-sys-color-primary-container: #00497D;
            --md-sys-color-on-primary-container: #D1E4FF;
            --md-sys-color-secondary-container: #3E4759;
            --md-sys-color-on-secondary-container: #D8E2F9;
            --md-sys-color-background: #1A1C1E;
            --md-sys-color-surface: #1A1C1E;
            --md-sys-color-surface-variant: #43474E;
            --md-sys-color-on-surface: #E2E2E6;
            --md-sys-color-on-surface-variant: #C3C7CF;
            --md-sys-color-outline: #8D9199;
            --md-sys-color-success: #76FF33;
            
            --md-sys-motion-standard: cubic-bezier(0.2, 0, 0, 1);
        }

        body {
            font-family: 'Roboto', 'Noto Sans SC', sans-serif;
            margin: 0;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* MD3 Top App Bar 风格 */
        .header {
            width: 100%;
            max-width: 600px;
            padding: 64px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .header h1 {
            margin: 0;
            font-size: 2.1rem;
            font-weight: 400;
            color: var(--md-sys-color-on-surface);
        }

        .header-subtitle-chip {
            align-self: flex-start;
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 列表容器 */
        #deploy-results, #classic-results {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #classic-results:not(:empty) {
            margin-top: 24px;
            border-top: 1px solid var(--md-sys-color-outline);
            padding-top: 24px;
        }

        /* MD3 Filled Card 风格按钮 */
        .button-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--md-sys-color-surface-variant);
            padding: 20px 24px;
            border-radius: 16px; /* MD3 Medium Corner */
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s var(--md-sys-motion-standard), background-color 0.2s;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .button-container:hover {
            background-color: #50545c;
            transform: scale(1.02);
        }

        .button-container:active {
            transform: scale(0.98);
        }

        .server-name {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--md-sys-color-primary);
        }

        /* 右侧信息排版 */
        .info-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stats-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8rem;
            color: var(--md-sys-color-on-surface-variant);
        }

        .online-count { color: var(--md-sys-color-primary); font-weight: bold; }

        /* 状态图标动画 */
        .status-icon {
            width: 24px;
            height: 24px;
        }

        /* 加载器动画 */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--md-sys-color-background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--md-sys-color-primary-container);
            border-top: 4px solid var(--md-sys-color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <header class="header">
        <h1 id="header-title-text">测试服务器</h1>
        <div class="header-subtitle-chip">MD3 核心监测站</div>
    </header>

    <main style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div id="deploy-results"></div>
        <div id="classic-results"></div>
        <div id="no-servers" class="hidden" style="margin-top: 40px; opacity: 0.5;">探测中...</div>
    </main>

    <script>
        const userLang = navigator.language || navigator.userLanguage; 
        const isChinese = userLang.startsWith('zh');

        const texts = {
            title: isChinese ? '测试服务器' : 'Test Server',
            online: isChinese ? '在线 ' : 'ON ',
            inbattles: isChinese ? '战斗 ' : 'BTL ',
            noServers: isChinese ? '当前暂无可用节点' : 'All nodes offline'
        };

        const svgs = {
            open: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="var(--md-sys-color-success)"/></svg>`,
            closed: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="var(--md-sys-color-outline)"/></svg>`,
            error: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="#FF5252"/></svg>`
        };

        let serverStatusData = {};

        async function fetchServerStatus() {
            try {
                const response = await fetch(`https://testanki1.github.io/server_status.json?t=${Date.now()}`);
                if (response.ok) serverStatusData = await response.json();
            } catch (e) { console.error(e); }
        }

        async function checkURL(url) {
            try {
                const response = await fetch(`${url}?t=${Date.now()}`, { method: 'HEAD' });
                return response.ok || response.status === 503;
            } catch { return false; }
        }

        function createButtonElement(label, link) {
            const a = document.createElement('a');
            a.className = 'button-container';
            a.href = link;
            a.innerHTML = `
                <span class="server-name">${label}</span>
                <div class="info-wrapper">
                    <div class="stats-wrapper">
                        <span class="online-count">--</span>
                        <span class="inbattles-count">--</span>
                    </div>
                    <span class="status-icon"></span>
                </div>
            `;
            return a;
        }

        async function fetchCounts(url) {
            try {
                const response = await fetch(`${url}?t=${Date.now()}`);
                const data = await response.json();
                let online = 0, battles = 0;
                if (data.nodes) {
                    online = Object.values(data.nodes).reduce((s, n) => s + n.online, 0);
                    battles = Object.values(data.nodes).reduce((s, n) => s + n.inbattles, 0);
                } else {
                    online = data.online || 0;
                    battles = data.inbattles || 0;
                }
                return { online, battles };
            } catch { return { online: 0, battles: 0 }; }
        }

        async function updateOrAddButton(containerId, elementId, label, targetUrl, balancerUrl, sortOrder) {
            const container = document.getElementById(containerId);
            let el = document.getElementById(elementId);
            if (!el) {
                el = createButtonElement(label, targetUrl);
                el.id = elementId;
                el.style.order = sortOrder;
                container.appendChild(el);
            }

            const { online, battles } = await fetchCounts(balancerUrl);
            el.querySelector('.online-count').textContent = `${texts.online}${online}`;
            el.querySelector('.inbattles-count').textContent = `${texts.inbattles}${battles}`;

            const icon = el.querySelector('.status-icon');
            const status = serverStatusData[targetUrl]?.status || 'Unknown';
            icon.innerHTML = (status === 'Open') ? svgs.open : svgs.closed;
        }

        async function checkURLs(isInitialLoad = false) {
            if (isInitialLoad) await fetchServerStatus();
            const promises = [];

            for (let i = 1; i <= 10; i++) {
                const balancer = `https://balancer.public-deploy${i}.test-eu.tankionline.com/balancer`;
                const target = `https://public-deploy${i}.test-eu.tankionline.com/browser-public/index.html`;
                promises.push(checkURL(balancer).then(ok => {
                    ok ? updateOrAddButton('deploy-results', `d-${i}`, `Deploy ${i}`, target, balancer, i) 
                       : document.getElementById(`d-${i}`)?.remove();
                }));
            }

            const cB = 'https://test.ru.tankionline.com/status';
            const cL = 'https://tankiclassic.com/play/';
            promises.push(checkURL(cB).then(ok => {
                ok ? updateOrAddButton('classic-results', 'c-btn', 'Classic', cL, cB, 1)
                   : document.getElementById('c-btn')?.remove();
            }));

            await Promise.allSettled(promises);
            document.getElementById('no-servers').classList.toggle('hidden', document.querySelectorAll('.button-container').length > 0);
            if (isInitialLoad) document.getElementById('loader').style.display = 'none';
        }

        checkURLs(true);
        setInterval(() => checkURLs(false), 8000);
    </script>
</body>
</html>
