<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D坦克 专业翻译助手</title>

    <!-- Google Fonts - MD3 推荐字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ========== MD3 CSS 变量（亮色主题） ========== */
        :root {
            --md-sys-color-primary: #d32f2f;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #ffdad4;
            --md-sys-color-on-primary-container: #410001;
            --md-sys-color-secondary: #5c4000;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #ffdea4;
            --md-sys-color-on-secondary-container: #1d1200;
            --md-sys-color-surface: #fefbff;
            --md-sys-color-on-surface: #1b1b1b;
            --md-sys-color-surface-variant: #f3ddda;
            --md-sys-color-on-surface-variant: #524342;
            --md-sys-color-outline: #857371;
            --md-sys-color-outline-variant: #d7c2bf;
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-error-container: #ffdad6;
            --md-sys-color-on-error-container: #410002;
            --md-sys-color-surface-container-lowest: #ffffff;
            --md-sys-color-surface-container-low: #f7f1f0;
            --md-sys-color-surface-container: #f1ebea;
            --md-sys-color-surface-container-high: #ebe5e4;
            --md-sys-color-surface-container-highest: #e6e0df;
            --md-sys-color-inverse-surface: #313030;
            --md-sys-color-inverse-on-surface: #f4f0ef;

            --md-sys-shape-corner-extra-small: 4px;
            --md-sys-shape-corner-small: 8px;
            --md-sys-shape-corner-medium: 12px;
            --md-sys-shape-corner-large: 16px;
            --md-sys-shape-corner-extra-large: 28px;

            --md-sys-elevation-0: none;
            --md-sys-elevation-1: 0px 1px 2px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15);
            --md-sys-elevation-3: 0px 1px 3px rgba(0,0,0,0.3), 0px 4px 8px 3px rgba(0,0,0,0.15);
        }

        /* ========== 全局重置 ========== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ========== 主容器 ========== */
        .chat-container {
            width: 100%;
            max-width: 640px;
            height: min(90vh, 800px);
            background: var(--md-sys-color-surface-container-lowest);
            border-radius: var(--md-sys-shape-corner-extra-large);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--md-sys-elevation-3);
        }

        /* ========== 顶部栏 ========== */
        .header {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 1.125rem;
            font-weight: 500;
        }

        .model-select {
            background: rgba(255, 255, 255, 0.15);
            color: var(--md-sys-color-on-primary);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: var(--md-sys-shape-corner-small);
            padding: 8px;
            outline: none;
        }

        .model-select option {
            background: var(--md-sys-color-surface-container-highest);
            color: var(--md-sys-color-on-surface);
        }

        /* ========== 聊天区域 ========== */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--md-sys-color-surface-container-low);
            scroll-behavior: smooth;
        }

        /* ========== 消息气泡 ========== */
        .message {
            max-width: 85%;
            padding: 12px 16px;
            font-size: 0.9375rem;
            line-height: 1.5;
            word-wrap: break-word;
            /* 👇 新增：强制保留换行符，防止多段翻译挤成一行 */
            white-space: pre-wrap; 
            animation: messageIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-msg {
            background: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            align-self: flex-start;
            border-radius: 12px 12px 12px 4px;
        }

        .user-msg {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            align-self: flex-end;
            border-radius: 12px 12px 4px 12px;
        }

        /* ========== 输入区域 ========== */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--md-sys-color-surface-container-lowest);
            border-top: 1px solid var(--md-sys-color-outline-variant);
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 28px;
            outline: none;
            font-size: 0.9375rem;
        }

        .input-area button {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 0 24px;
            border-radius: 28px;
            cursor: pointer;
            font-weight: 500;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading-text { font-size: 12px; color: #888; display: none; padding-left: 16px; }
        .loading-text.active { display: block; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <span class="header-title">3D坦克(Tanki) 翻译引擎</span>
        <select id="modelSelect" class="model-select">
            <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
            <option value="gemini-3.1-flash-lite-preview" selected>Gemini 3.1 Flash Lite</option>
        </select>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai-msg">【系统】正在获取最新专有词库，请稍候...</div>
    </div>
    
    <div class="loading-text" id="loadingTip">AI 正在翻译中...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="正在加载词库，请稍候..." onkeypress="handleEnter(event)" disabled>
        <button id="sendBtn" onclick="sendMessage()" disabled>翻译</button>
    </div>
</div>

<script>
    // ========== 配置 - Pages Functions 代理地址 ==========
    const PROXY_URL = 'https://findorp.pages.dev/translate';

    let dictPrompt = "【专有名词对照表】\n";

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const loadingTip = document.getElementById("loadingTip");
    const modelSelect = document.getElementById("modelSelect");

    // ========== 异步加载外部 GitHub 词库 ==========
    window.addEventListener('DOMContentLoaded', async () => {
        const aiMsgDiv = document.querySelector(".ai-msg");
        try {
            const response = await fetch('https://raw.githubusercontent.com/Testanki1/testanki1.github.io/refs/heads/main/translations.js');
            const text = await response.text();
            
            const start = text.indexOf('{');
            const end = text.lastIndexOf('}');
            if (start !== -1 && end !== -1) {
                const objText = text.substring(start, end + 1);
                const dict = new Function('return ' + objText)();
                for (const key in dict) {
                    dictPrompt += `英文 "${key}" 必须严格翻译为中文 "${dict[key]}"\n`;
                }
            }
            aiMsgDiv.innerHTML = "你好！我已加载【3D坦克】专有词库。<br>请输入英文更新日志或文本，将为你输出精准的中文翻译。";
            userInput.placeholder = "输入英文文本，按 Enter 发送...";
        } catch (error) {
            aiMsgDiv.innerHTML = "⚠️ 词库加载失败，请检查网络或刷新重试。";
            userInput.placeholder = "词库加载失败";
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        }
    });

    function handleEnter(event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    // ========== 核心发送函数（SSE 流式） ==========
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, "user-msg");
        userInput.value = "";

        sendBtn.disabled = true;
        userInput.disabled = true;
        loadingTip.classList.add("active");

        const aiMsgDiv = document.createElement("div");
        aiMsgDiv.className = "message ai-msg";
        aiMsgDiv.textContent = ""; 
        chatBox.appendChild(aiMsgDiv);

        try {
            const response = await fetch(PROXY_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: modelSelect.value,
                    text: text,
                    systemInstruction: {
                        parts:[{
                            text: `你是一个3D坦克游戏翻译工具。
你的任务只有：将外文的句子翻译为中文
首先判断句子的主体语言，如果句子除了主体语言外，还用了其他语言的词汇（如“什么是 Garage”），则仅将该主体语言翻译为中文，并保留句子中任何其他非主体语言的词汇。
然后直接写出翻译后的结果。
以下为游戏内专有名称中英文对照词库：
${dictPrompt}`
                        }]
                    }
                })
            });

            if (!response.ok) throw new Error("网络错误");

            // ========== 更稳健的 SSE 读取器 ==========
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // 解码网络字节并拼接到缓冲区
                buffer += decoder.decode(value, { stream: true });

                // SSE 事件是以双换行符 \n\n 结尾的，根据它把数据切分出来
                let boundaryIndex;
                while ((boundaryIndex = buffer.indexOf('\n\n')) !== -1) {
                    const eventStr = buffer.slice(0, boundaryIndex);
                    buffer = buffer.slice(boundaryIndex + 2);

                    // 提取所有带 "data: " 的行，提取内容
                    const dataLines = eventStr.split('\n')
                        .filter(line => line.startsWith('data: '))
                        .map(line => line.replace(/^data:\s*/, ''));
                    
                    const dataStr = dataLines.join('');
                    if (!dataStr || dataStr === '[DONE]') continue;

                    try {
                        const parsed = JSON.parse(dataStr);
                        const candidates = Array.isArray(parsed) ? parsed[0]?.candidates : parsed.candidates;
                        const textPiece = candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (textPiece) {
                            // 👇 【关键修复点】：将原先的 = 改为 += ，拼接流式文本块，就不会出现覆盖漏字了！
                            aiMsgDiv.textContent += textPiece;
                            
                            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: "smooth" });
                        }
                    } catch (e) {
                        console.error("解析流式片段失败", e);
                    }
                }
            }
        } catch (error) {
            aiMsgDiv.textContent = "❌ 翻译请求失败，请稍后重试。";
        } finally {
            sendBtn.disabled = false;
            userInput.disabled = false;
            loadingTip.classList.remove("active");
            userInput.focus();
        }
    }

    function appendMessage(text, className) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: "smooth" });
    }
</script>

</body>
</html>
